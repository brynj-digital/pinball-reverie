<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 575 1050" width="575" height="1050">
  <!--
    MOONDIAL — table 1 of Pinball Reverie. A Victorian night observatory:
    orrery constellation bumpers, moon-phase lanes, a comet target bank and
    the meridian orbit. Master units: 1 SVG unit = 1 mm (style guide §3).

    This file is the single source of truth for table shape (§5e):
    collision-/sensor-/anchor- prefixed elements are parsed into physics by
    src/table/SvgCollision.ts. The collision strokes ARE the drawn walls.
  -->
  <defs>
    <linearGradient id="fieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#12141f"/>
      <stop offset="0.45" stop-color="#1b1e2c"/>
      <stop offset="1" stop-color="#171a27"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.45" r="0.8">
      <stop offset="0.6" stop-color="#07080d" stop-opacity="0"/>
      <stop offset="1" stop-color="#07080d" stop-opacity="0.4"/>
    </radialGradient>
    <radialGradient id="nebulaViolet" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#4e37a8" stop-opacity="0.30"/>
      <stop offset="1" stop-color="#4e37a8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nebulaMagenta" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#b01860" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#b01860" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="chromeText" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.46" stop-color="#d7dce8"/>
      <stop offset="0.52" stop-color="#565d6e"/>
      <stop offset="0.60" stop-color="#aeb6c8"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <filter id="glowSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ═══════════════ art: field ═══════════════ -->
  <g id="art-field">
    <rect x="0" y="0" width="575" height="1050" fill="url(#fieldGrad)"/>
    <ellipse cx="180" cy="300" rx="200" ry="160" fill="url(#nebulaViolet)"/>
    <ellipse cx="400" cy="560" rx="180" ry="150" fill="url(#nebulaMagenta)"/>
    <ellipse cx="290" cy="850" rx="220" ry="140" fill="url(#nebulaViolet)" opacity="0.5"/>

    <!-- starfield -->
    <g fill="#d7dce8">
      <circle cx="38" cy="620" r="1.4" opacity="0.55"/><circle cx="92" cy="480" r="1.0" opacity="0.4"/>
      <circle cx="140" cy="560" r="1.7" opacity="0.6"/><circle cx="205" cy="500" r="1.1" opacity="0.45"/>
      <circle cx="255" cy="545" r="1.5" opacity="0.5"/><circle cx="315" cy="470" r="1.0" opacity="0.4"/>
      <circle cx="368" cy="520" r="1.6" opacity="0.6"/><circle cx="428" cy="470" r="1.2" opacity="0.45"/>
      <circle cx="470" cy="560" r="1.5" opacity="0.5"/><circle cx="118" cy="655" r="1.2" opacity="0.5"/>
      <circle cx="180" cy="690" r="1.0" opacity="0.4"/><circle cx="330" cy="675" r="1.4" opacity="0.55"/>
      <circle cx="415" cy="650" r="1.1" opacity="0.4"/><circle cx="90" cy="760" r="1.5" opacity="0.5"/>
      <circle cx="240" cy="760" r="1.1" opacity="0.4"/><circle cx="390" cy="755" r="1.6" opacity="0.55"/>
      <circle cx="160" cy="850" r="1.2" opacity="0.45"/><circle cx="352" cy="860" r="1.3" opacity="0.5"/>
      <circle cx="262" cy="912" r="1.0" opacity="0.35"/><circle cx="60" cy="900" r="1.1" opacity="0.4"/>
      <circle cx="455" cy="840" r="1.2" opacity="0.45"/><circle cx="110" cy="205" r="1.3" opacity="0.5"/>
      <circle cx="205" cy="175" r="1.0" opacity="0.4"/><circle cx="320" cy="185" r="1.4" opacity="0.55"/>
      <circle cx="405" cy="215" r="1.1" opacity="0.45"/><circle cx="455" cy="165" r="1.3" opacity="0.5"/>
      <circle cx="150" cy="255" r="1.0" opacity="0.35"/><circle cx="372" cy="262" r="1.2" opacity="0.45"/>
      <circle cx="90" cy="345" r="1.1" opacity="0.4"/><circle cx="435" cy="345" r="1.4" opacity="0.5"/>
      <circle cx="130" cy="415" r="1.0" opacity="0.35"/><circle cx="392" cy="408" r="1.1" opacity="0.4"/>
      <circle cx="228" cy="640" r="1.8" opacity="0.65"/><circle cx="300" cy="600" r="1.2" opacity="0.45"/>
      <circle cx="48" cy="530" r="1.2" opacity="0.45"/><circle cx="496" cy="700" r="1.3" opacity="0.5"/>
    </g>

    <!-- orrery chart rings around the constellation (bumper nest) -->
    <g fill="none" stroke="#2c3352" stroke-width="1.5">
      <circle cx="260" cy="362" r="98" stroke-dasharray="5 7"/>
      <circle cx="260" cy="362" r="132" stroke-dasharray="2 9"/>
    </g>
    <!-- constellation lines between the bumper stars -->
    <g stroke="#7f8fc9" stroke-width="1.2" opacity="0.45">
      <line x1="190" y1="330" x2="330" y2="330"/>
      <line x1="190" y1="330" x2="260" y2="425"/>
      <line x1="330" y1="330" x2="260" y2="425"/>
      <line x1="190" y1="330" x2="130" y2="255"/>
      <line x1="330" y1="330" x2="392" y2="262"/>
    </g>

    <!-- the moondial: a brass half-dial with gnomon, above the constellation -->
    <g id="art-moondial">
      <path d="M 205 228 A 55 55 0 0 1 315 228 Z" fill="#262a3e" stroke="#07080d" stroke-width="2"/>
      <path d="M 213 228 A 47 47 0 0 1 307 228" fill="none" stroke="#9c7c2c" stroke-width="3"/>
      <g stroke="#e0b64e" stroke-width="2">
        <line x1="260" y1="181" x2="260" y2="192"/>
        <line x1="227" y1="195" x2="234" y2="203"/>
        <line x1="293" y1="195" x2="286" y2="203"/>
        <line x1="215" y1="223" x2="225" y2="225"/>
        <line x1="305" y1="223" x2="295" y2="225"/>
      </g>
      <line x1="260" y1="228" x2="283" y2="196" stroke="#f4d27a" stroke-width="3" stroke-linecap="round"/>
      <circle cx="260" cy="228" r="5" fill="#e0b64e" stroke="#07080d" stroke-width="1.5"/>
    </g>

    <!-- moon-phase inserts in the top lanes (rollovers light these) -->
    <g id="art-inserts-moons" stroke="#07080d" stroke-width="1.5">
      <circle cx="160" cy="95" r="11" fill="#2f2547"/>
      <path d="M 160 84 a 11 11 0 0 0 0 22 a 8.5 11 0 0 1 0 -22 Z" fill="#8c6bff" opacity="0.35"/>
      <circle cx="260" cy="95" r="11" fill="#2f2547"/>
      <path d="M 260 84 a 11 11 0 0 0 0 22 Z" fill="#8c6bff" opacity="0.35"/>
      <circle cx="360" cy="95" r="11" fill="#2f2547"/>
      <circle cx="360" cy="95" r="8" fill="#8c6bff" opacity="0.35"/>
    </g>

    <!-- comet icons pointing at the target bank -->
    <g id="art-comets" opacity="0.8">
      <g stroke="#2fc9d6" stroke-width="2" stroke-linecap="round">
        <line x1="448" y1="510" x2="470" y2="516"/><line x1="450" y1="518" x2="468" y2="521"/>
        <line x1="448" y1="552" x2="470" y2="558"/><line x1="450" y1="560" x2="468" y2="563"/>
        <line x1="448" y1="594" x2="470" y2="600"/><line x1="450" y1="602" x2="468" y2="605"/>
      </g>
      <circle cx="474" cy="518" r="4.5" fill="#2fc9d6"/>
      <circle cx="474" cy="560" r="4.5" fill="#2fc9d6"/>
      <circle cx="474" cy="602" r="4.5" fill="#2fc9d6"/>
    </g>

    <!-- orbit lane arrows (shot direction: up the left lane) -->
    <g stroke="#8c6bff" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.75">
      <path d="M 24 476 L 32.5 462 L 41 476"/>
      <path d="M 24 446 L 32.5 432 L 41 446"/>
    </g>
    <!-- plunger lane arrows -->
    <g stroke="#e0b64e" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7">
      <path d="M 539 706 L 547.5 692 L 556 706"/>
      <path d="M 539 666 L 547.5 652 L 556 666"/>
    </g>

    <!-- wordmark -->
    <g id="art-wordmark">
      <text x="260" y="632" text-anchor="middle" font-family="ui-monospace, monospace"
            font-size="40" font-weight="800" letter-spacing="6"
            fill="#4e37a8" opacity="0.5" filter="url(#glowSoft)">MOONDIAL</text>
      <text x="260" y="628" text-anchor="middle" font-family="ui-monospace, monospace"
            font-size="40" font-weight="800" letter-spacing="6"
            fill="url(#chromeText)" stroke="#07080d" stroke-width="2" paint-order="stroke">MOONDIAL</text>
      <text x="260" y="628" text-anchor="middle" font-family="ui-monospace, monospace"
            font-size="40" font-weight="800" letter-spacing="6"
            fill="none" stroke="#ff3e9a" stroke-width="0.8" opacity="0.9">MOONDIAL</text>
      <text x="260" y="655" text-anchor="middle" font-family="ui-monospace, monospace"
            font-size="11" letter-spacing="5" fill="#7f8fc9">A · NIGHT · OBSERVATORY</text>
    </g>

    <rect x="0" y="0" width="575" height="1050" fill="url(#vignette)"/>
  </g>

  <!-- ═══════════════ collision (the strokes ARE the walls) ═══════════════ -->
  <g stroke="#7f8fc9" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none">
    <!-- outer shell: left wall, r260 arc to apex (260,0), r315 arc over the
         plunger lane, right wall; Z closes the floor -->
    <path id="collision-loop-shell" d="M 0 1050 L 0 260 L 6.5 202.1 L 25.7 147.2 L 56.7 97.9 L 97.9 56.7 L 147.2 25.7 L 202.1 6.5 L 260 0 L 330.1 7.9 L 396.7 31.2 L 456.4 68.7 L 506.3 118.6 L 543.3 178.3 L 567.2 244.9 L 575 315 L 575 1050 Z"/>
    <!-- inlane funnels, each ending tangent to its flipper base circle -->
    <path id="collision-wall-funnel-left" d="M 0 800 L 178.4 940.6 L 163 955 L 163 1050"/>
    <path id="collision-wall-funnel-right" d="M 520 800 L 341.6 940.6 L 357 955 L 357 1050"/>
    <!-- plunger lane inner wall -->
    <path id="collision-wall-lane" d="M 520 300 L 520 1050"/>
    <!-- orbit inner wall: left lane, arc under the arch, tail to the lane wall top -->
    <path id="collision-wall-orbit" d="M 65 550 L 65 260 L 68.0 226.1 L 76.8 193.3 L 91.1 162.5 L 110.6 134.7 L 134.7 110.6 L 162.5 91.1 L 193.3 76.8 L 226.1 68.0 L 260 65 L 293.9 68.0 L 326.7 76.8 L 357.5 91.1 L 385.3 110.6 L 409.4 134.7 L 520 300"/>
    <!-- top-lane dividers, ending 4 mm below the orbit arc line -->
    <path id="collision-wall-divider-left" d="M 215 74.3 L 215 150"/>
    <path id="collision-wall-divider-right" d="M 305 74.3 L 305 150"/>
    <!-- drop-target bank housing -->
    <path id="collision-wall-bank-housing" d="M 520 490 L 503 498 L 503 622 L 520 630"/>
  </g>

  <!-- ═══════════════ sensors (invisible; zones only) ═══════════════ -->
  <g fill="none" stroke="none">
    <rect id="sensor-drain" x="0" y="1005" width="520" height="30"/>
    <rect id="sensor-rollover-1" x="145" y="105" width="30" height="20"/>
    <rect id="sensor-rollover-2" x="245" y="105" width="30" height="20"/>
    <rect id="sensor-rollover-3" x="345" y="105" width="30" height="20"/>
    <rect id="sensor-spinner" x="0" y="394" width="65" height="12"/>
    <rect id="sensor-ramp-entry" x="2.5" y="492" width="60" height="16"/>
    <rect id="sensor-ramp-exit" x="442" y="117" width="36" height="36"/>
  </g>

  <!-- ═══════════════ anchors (invisible placement points) ═══════════════ -->
  <g fill="none" stroke="none">
    <circle id="anchor-flipper-left" cx="171" cy="950" r="5"/>
    <circle id="anchor-flipper-right" cx="349" cy="950" r="5"/>
    <circle id="anchor-spawn" cx="547.5" cy="1000" r="5"/>
    <circle id="anchor-bumper-1" cx="190" cy="330" r="5"/>
    <circle id="anchor-bumper-2" cx="330" cy="330" r="5"/>
    <circle id="anchor-bumper-3" cx="260" cy="425" r="5"/>
  </g>
</svg>
