<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 360" width="300" height="360">
  <!-- MIDNIGHT MIDWAY backglass (M10): shown in the landscape side panel
       above the DMD and as the table-select card (§4.5/§8). Chrome-horizon
       wordmark, the ferris wheel lit against the night, the coaster's first
       drop, the same moon. Carnival field ramp + magenta feature color +
       marquee bulbs per STYLE-GUIDE §2 (2026-07-05 amendments). -->
  <defs>
    <linearGradient id="mwNight" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1c0f26"/>
      <stop offset="0.55" stop-color="#2b1638"/>
      <stop offset="1" stop-color="#3d1f4d"/>
    </linearGradient>
    <linearGradient id="mwChrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.46" stop-color="#d7dce8"/>
      <stop offset="0.52" stop-color="#565d6e"/>
      <stop offset="0.60" stop-color="#aeb6c8"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <radialGradient id="mwWheelGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff3e9a" stop-opacity="0.4"/>
      <stop offset="1" stop-color="#ff3e9a" stop-opacity="0"/>
    </radialGradient>
    <filter id="mwGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="300" height="360" fill="url(#mwNight)"/>

  <!-- the moon and a scatter of stars -->
  <g opacity="0.85">
    <circle cx="252" cy="44" r="16" fill="#aeb6c8" stroke="#07080d" stroke-width="1.5"/>
    <path d="M 252 28 a 16 16 0 0 0 0 32 a 12 16 0 0 1 0 -32 Z" fill="#d7dce8" opacity="0.8"/>
  </g>
  <g fill="#7f8fc9">
    <circle cx="40" cy="36" r="1.2" opacity="0.4"/><circle cx="96" cy="24" r="1" opacity="0.35"/>
    <circle cx="150" cy="44" r="1.1" opacity="0.4"/><circle cx="200" cy="30" r="1" opacity="0.35"/>
    <circle cx="66" cy="76" r="1" opacity="0.3"/><circle cx="284" cy="96" r="1" opacity="0.3"/>
  </g>

  <!-- the ferris wheel, lit, dominating the left -->
  <g>
    <circle cx="104" cy="146" r="86" fill="url(#mwWheelGlow)"/>
    <circle cx="104" cy="146" r="62" fill="none" stroke="#07080d" stroke-width="6"/>
    <circle cx="104" cy="146" r="62" fill="none" stroke="#45215a" stroke-width="3"/>
    <g stroke="#45215a" stroke-width="2.5">
      <line x1="104" y1="146" x2="104" y2="84"/>
      <line x1="104" y1="146" x2="163" y2="127"/>
      <line x1="104" y1="146" x2="140" y2="196"/>
      <line x1="104" y1="146" x2="68" y2="196"/>
      <line x1="104" y1="146" x2="45" y2="127"/>
    </g>
    <path d="M 104 146 L 78 236 M 104 146 L 130 236" stroke="#45215a" stroke-width="4" fill="none"/>
    <circle cx="104" cy="146" r="7" fill="#e0b64e" stroke="#07080d" stroke-width="1.5"/>
    <!-- gondolas: magenta cars, lamps on the rim -->
    <g fill="#b01860" stroke="#07080d" stroke-width="1.5">
      <rect x="97" y="80" width="14" height="10" rx="3"/>
      <rect x="156" y="123" width="14" height="10" rx="3"/>
      <rect x="133" y="192" width="14" height="10" rx="3"/>
      <rect x="61" y="192" width="14" height="10" rx="3"/>
      <rect x="38" y="123" width="14" height="10" rx="3"/>
    </g>
    <g fill="#ffdf9e" opacity="0.85">
      <circle cx="104" cy="84" r="2"/><circle cx="140" cy="96" r="2"/><circle cx="163" cy="127" r="2"/>
      <circle cx="165" cy="164" r="2"/><circle cx="140" cy="196" r="2"/><circle cx="104" cy="208" r="2"/>
      <circle cx="68" cy="196" r="2"/><circle cx="43" cy="164" r="2"/><circle cx="45" cy="127" r="2"/>
      <circle cx="68" cy="96" r="2"/>
    </g>
  </g>

  <!-- the coaster's first drop, rushing in from the right -->
  <g>
    <path d="M 300 120 L 262 128 L 232 148 L 214 178 L 208 214 L 216 236 L 236 248 L 262 250 L 300 244"
          fill="none" stroke="#07080d" stroke-width="7"/>
    <path d="M 300 120 L 262 128 L 232 148 L 214 178 L 208 214 L 216 236 L 236 248 L 262 250 L 300 244"
          fill="none" stroke="#aeb6c8" stroke-width="3.5"/>
    <g stroke="#45215a" stroke-width="2.5">
      <line x1="232" y1="148" x2="232" y2="252"/><line x1="209" y1="200" x2="209" y2="252"/>
      <line x1="262" y1="128" x2="262" y2="118"/>
    </g>
    <!-- the car mid-drop, headlamp on -->
    <rect x="216" y="170" width="18" height="11" rx="3" fill="#b01860" stroke="#07080d" stroke-width="1.5"
          transform="rotate(58 225 175)"/>
    <circle cx="215" cy="186" r="3" fill="#fff4d6" filter="url(#mwGlow)"/>
    <g stroke="#ffdf9e" stroke-width="1.2" opacity="0.7">
      <line x1="238" y1="150" x2="244" y2="142"/><line x1="228" y1="160" x2="235" y2="153"/>
    </g>
  </g>

  <!-- tent tops and the gate along the bottom, bulbs strung between -->
  <g>
    <path d="M 0 262 L 34 240 L 68 262 M 88 262 L 122 244 L 156 262 M 176 262 L 214 242 L 252 262 L 300 250"
          fill="none" stroke="#07080d" stroke-width="5"/>
    <path d="M 0 262 L 34 240 L 68 262 M 88 262 L 122 244 L 156 262 M 176 262 L 214 242 L 252 262 L 300 250"
          fill="none" stroke="#45215a" stroke-width="2.5"/>
    <path d="M 0 250 Q 75 268 150 258 Q 225 248 300 262" fill="none" stroke="#9c7c2c" stroke-width="1.5" opacity="0.8"/>
    <g fill="#ffdf9e" opacity="0.85">
      <circle cx="20" cy="253" r="1.8"/><circle cx="60" cy="258" r="1.8"/><circle cx="100" cy="260" r="1.8"/>
      <circle cx="140" cy="259" r="1.8"/><circle cx="180" cy="256" r="1.8"/><circle cx="220" cy="253" r="1.8"/>
      <circle cx="260" cy="255" r="1.8"/>
    </g>
  </g>

  <!-- wordmark: chrome horizon, magenta rim, violet reverie glow -->
  <g>
    <text x="150" y="300" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="25" font-weight="800" letter-spacing="1"
          fill="#4e37a8" opacity="0.55" filter="url(#mwGlow)">MIDNIGHT</text>
    <text x="150" y="297" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="25" font-weight="800" letter-spacing="1"
          fill="url(#mwChrome)" stroke="#07080d" stroke-width="2" paint-order="stroke">MIDNIGHT</text>
    <text x="150" y="297" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="25" font-weight="800" letter-spacing="1"
          fill="none" stroke="#ff3e9a" stroke-width="0.8" opacity="0.9">MIDNIGHT</text>
    <text x="150" y="330" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="30" font-weight="800" letter-spacing="3"
          fill="#4e37a8" opacity="0.55" filter="url(#mwGlow)">MIDWAY</text>
    <text x="150" y="327" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="30" font-weight="800" letter-spacing="3"
          fill="url(#mwChrome)" stroke="#07080d" stroke-width="2" paint-order="stroke">MIDWAY</text>
    <text x="150" y="327" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="30" font-weight="800" letter-spacing="3"
          fill="none" stroke="#ff3e9a" stroke-width="0.8" opacity="0.9">MIDWAY</text>
    <text x="150" y="348" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="9" letter-spacing="4" fill="#8a4d9e">RIDE · EVERYTHING</text>
  </g>

  <!-- deco frame -->
  <rect x="5" y="5" width="290" height="350" fill="none" stroke="#2c3352" stroke-width="3"/>
  <rect x="9" y="9" width="282" height="342" fill="none" stroke="#9c7c2c" stroke-width="1.5"/>
</svg>
