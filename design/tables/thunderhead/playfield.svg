<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 575 1050" width="575" height="1050">
  <!-- THUNDERHEAD master playfield (table 9) — the storm-watch airship. 1 unit
       = 1 mm. Collision truth: the paths in defs (parsed by SvgCollision.ts,
       restroked as art in art-rails). Geometry is the soak-proven grey-box
       set UNCHANGED; this file adds the dress (stagger feel signed off
       2026-07-17). Palette: stratus field variant + storm yellow
       (design/tokens.css; STYLE-GUIDE §2). -->
  <defs>
    <linearGradient id="thFieldGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#201f2e"/>
      <stop offset="0.22" stop-color="#16161f"/>
      <stop offset="1" stop-color="#101019"/>
    </linearGradient>
    <radialGradient id="thVignette" cx="0.5" cy="0.42" r="0.75">
      <stop offset="0.62" stop-color="#101019" stop-opacity="0"/>
      <stop offset="1" stop-color="#000" stop-opacity="0.42"/>
    </radialGradient>
    <radialGradient id="thCellGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f4f491" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#f4f491" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="thCloudWell" cx="0.5" cy="0" r="1">
      <stop offset="0" stop-color="#5e5b80" stop-opacity="0.22"/>
      <stop offset="0.6" stop-color="#5e5b80" stop-opacity="0.05"/>
      <stop offset="1" stop-color="#5e5b80" stop-opacity="0"/>
    </radialGradient>
    <g id="collision-paths" fill="none">
      <path data-width="12" data-z="all" id="collision-loop-shell" d="M 0 1050 L 0 260 L 1.3 234.5 L 5 209.3 L 11.2 184.5 L 19.8 160.5 L 30.7 137.4 L 43.8 115.6 L 59 95.1 L 76.2 76.2 L 95.1 59 L 115.6 43.8 L 137.4 30.7 L 160.5 19.8 L 184.5 11.2 L 209.3 5 L 234.5 1.3 L 260 0 L 290.9 1.5 L 321.5 6.1 L 351.4 13.6 L 380.5 24 L 408.5 37.2 L 435 53.1 L 459.8 71.5 L 482.7 92.3 L 503.5 115.2 L 521.9 140 L 537.8 166.5 L 551 194.5 L 561.4 223.6 L 568.9 253.5 L 573.5 284.1 L 575 315 L 575 1050 Z"/>
      <path data-width="12" id="collision-wall-lane" data-z="all" d="M 520 300 L 520 1050"/>
      <path data-width="12" id="collision-wall-orbit-a" d="M 65 550 L 65 260 L 66.5 236.2 L 70.8 212.8 L 78 190.1 L 87.8 168.5 L 100.3 148.2 L 115.1 129.5 L 132.1 112.8 L 151 98.3 L 171.5 86.3 L 193.3 76.8"/>
      <path data-width="12" id="collision-wall-orbit-b" d="M 239.6 66.1 L 263.4 65"/>
      <path data-width="12" id="collision-wall-orbit-c" d="M 310.5 71.6 L 333 79.2 L 354.5 89.4 L 374.6 102.2 L 393 117.4 L 409.4 134.7 L 520 300"/>
      <path data-width="12" id="collision-wall-divider-1" d="M 185 80 L 185 148"/>
      <path data-width="12" id="collision-wall-divider-2" d="M 257 68 L 257 148"/>
      <path data-width="12" id="collision-wall-divider-3" d="M 329 80 L 329 148"/>
      <path data-width="12" id="collision-wall-nacelle-hood" d="M 358 505 L 361 474 L 369 449 L 381 431 L 390 424 L 414 434 L 428 448 L 437 468 L 441 505"/>
      <path data-width="12" id="collision-wall-guide-left" d="M 52 785 L 52 875 L 181.2 908.4"/>
      <path data-width="12" id="collision-wall-guide-right" d="M 470 690 L 470 905 L 338.9 938.4"/>
      <path data-width="12" id="collision-wall-deflector" d="M 0 556 L 34 590 L 30 640 L 30 746 L 0 758"/>
      <path data-width="12" id="collision-wall-plunger-saddle" d="M 526 1000 L 569 1000"/>
      <path data-width="12" data-surface="spine" id="collision-wall-spine-west" d="M 89 611.1 L 87 560.6 L 86 505.2 L 86 450 L 86 400.3 L 84 329.8 L 87.4 285.8 L 102 249.5 L 126.7 223.5 L 153.2 213.2"/>
      <path data-width="12" data-surface="spine" id="collision-wall-spine-east" d="M 132 653.7 L 129 608.9 L 127 559.4 L 126 504.8 L 126 450 L 126 399.7 L 124 330.2 L 126.6 294.2 L 136 270.5 L 149.3 256.5 L 166.8 250.8"/>
    </g>
  </defs>

  <!-- ═══════════════ art: over the bow, into the storm ═══════════════ -->
  <g id="art-field">
    <rect x="0" y="0" width="575" height="1050" fill="url(#thFieldGrad)"/>
    <!-- the cloud-top: the thunderhead boiling far below the bow -->
    <rect x="0" y="0" width="575" height="230" fill="url(#thCloudWell)"/>
    <g>
      <ellipse cx="90" cy="90" rx="110" ry="44" fill="#201f2e" opacity="0.9"/>
      <ellipse cx="250" cy="60" rx="130" ry="42" fill="#201f2e" opacity="0.8"/>
      <ellipse cx="430" cy="95" rx="120" ry="46" fill="#201f2e" opacity="0.9"/>
      <ellipse cx="160" cy="130" rx="90" ry="30" fill="#34324a" opacity="0.35"/>
      <ellipse cx="330" cy="120" rx="100" ry="32" fill="#34324a" opacity="0.3"/>
      <ellipse cx="500" cy="140" rx="80" ry="30" fill="#34324a" opacity="0.3"/>
      <ellipse cx="60" cy="150" rx="70" ry="24" fill="#5e5b80" opacity="0.16"/>
      <ellipse cx="280" cy="155" rx="90" ry="24" fill="#5e5b80" opacity="0.14"/>
      <ellipse cx="470" cy="170" rx="76" ry="22" fill="#5e5b80" opacity="0.13"/>
    </g>
    <!-- lightning working INSIDE the cloud (storm yellow, kept scarce) -->
    <g stroke="#f4f491" fill="none" stroke-width="1.6">
      <polyline points="70,58 84,84 74,86 92,116" opacity="0.5"/>
      <polyline points="380,44 368,72 380,74 366,104" opacity="0.38"/>
      <polyline points="490,92 502,116 492,118 504,142" opacity="0.28"/>
    </g>
    <!-- moonlit sea glints beyond the cloud rim -->
    <g stroke="#d7dce8" stroke-width="1" opacity="0.18">
      <line x1="34" y1="22" x2="58" y2="22"/><line x1="150" y1="12" x2="168" y2="12"/>
      <line x1="300" y1="18" x2="326" y2="18"/><line x1="440" y1="26" x2="456" y2="26"/>
    </g>
    <!-- the envelope's flank: panel seams sweeping up the spine side -->
    <g stroke="#34324a" stroke-width="2.2" fill="none" opacity="0.5">
        <path d="M 118 660 Q 170 330 330 186"/>
        <path d="M 126 650 Q 184 312 354 180"/>
        <path d="M 134 640 Q 198 294 378 174"/>
        <path d="M 142 630 Q 212 276 402 168"/>
    </g>
    <!-- rigging lines across the upper field -->
    <g stroke="#5e5b80" stroke-width="1" opacity="0.22">
        <line x1="150" y1="205" x2="330" y2="470"/>
        <line x1="200" y1="190" x2="420" y2="430"/>
        <line x1="255" y1="175" x2="470" y2="400"/>
        <line x1="120" y1="240" x2="300" y2="520"/>
        <line x1="310" y1="160" x2="500" y2="340"/>
    </g>
    <!-- the gondola deck: plank seams, listing to starboard with the stagger -->
    <g stroke="#201f2e" stroke-width="2" opacity="0.75">
      <line x1="30" y1="836" x2="500" y2="866"/>
      <line x1="34" y1="876" x2="496" y2="906"/>
      <line x1="60" y1="916" x2="470" y2="946"/>
    </g>
    <line x1="52" y1="898" x2="470" y2="928" stroke="#d7dce8" stroke-width="1.2" opacity="0.12"/>
    <!-- barograph strip on the deck edge -->
    <g opacity="0.6">
      <rect x="196" y="838" width="128" height="26" rx="3" fill="#101019" stroke="#34324a" stroke-width="1.5"/>
      <polyline points="204,856 220,848 234,853 250,844 266,852 282,842 298,850 314,845"
                fill="none" stroke="#f4f491" stroke-width="1.6" opacity="0.8"/>
    </g>
    <text x="260" y="1040" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="15" letter-spacing="6" fill="#f4f491" opacity="0.75">THUNDERHEAD</text>
  </g>

  <!-- ═══════════════ art: fixtures ═══════════════ -->
  <g id="art-polish">
    <!-- G-A-L-E over the lanes -->
    <g font-family="ui-monospace, monospace" font-size="13" text-anchor="middle" fill="#f4f491" opacity="0.8">
      <text x="155" y="112">G</text><text x="219" y="108">A</text>
      <text x="291" y="108">L</text><text x="355" y="112">E</text>
    </g>
    <!-- THE CHARGE CELLS -->
    <circle cx="200" cy="270" r="72" fill="url(#thCellGlow)"/>
    <circle cx="330" cy="255" r="72" fill="url(#thCellGlow)"/>
    <circle cx="200" cy="270" r="34" fill="none" stroke="#5e5b80" stroke-width="1.4" stroke-dasharray="5 6" opacity="0.55"/><circle cx="200" cy="270" r="23" fill="#101019" opacity="0.75"/><circle cx="200" cy="270" r="23" fill="none" stroke="#34324a" stroke-width="2.5"/><line x1="186" y1="254" x2="214" y2="254" stroke="#5e5b80" stroke-width="3"/><line x1="187" y1="262" x2="213" y2="262" stroke="#5e5b80" stroke-width="3"/><line x1="188" y1="270" x2="212" y2="270" stroke="#5e5b80" stroke-width="3"/><line x1="189" y1="278" x2="211" y2="278" stroke="#5e5b80" stroke-width="3"/><line x1="190" y1="286" x2="210" y2="286" stroke="#5e5b80" stroke-width="3"/><circle cx="200" cy="246" r="3.4" fill="#f4f491" opacity="0.9"/>
    <circle cx="330" cy="255" r="34" fill="none" stroke="#5e5b80" stroke-width="1.4" stroke-dasharray="5 6" opacity="0.55"/><circle cx="330" cy="255" r="23" fill="#101019" opacity="0.75"/><circle cx="330" cy="255" r="23" fill="none" stroke="#34324a" stroke-width="2.5"/><line x1="316" y1="239" x2="344" y2="239" stroke="#5e5b80" stroke-width="3"/><line x1="317" y1="247" x2="343" y2="247" stroke="#5e5b80" stroke-width="3"/><line x1="318" y1="255" x2="342" y2="255" stroke="#5e5b80" stroke-width="3"/><line x1="319" y1="263" x2="341" y2="263" stroke="#5e5b80" stroke-width="3"/><line x1="320" y1="271" x2="340" y2="271" stroke="#5e5b80" stroke-width="3"/><circle cx="330" cy="231" r="3.4" fill="#f4f491" opacity="0.9"/>
    <polyline points="228,262 250,268 244,256 268,262 262,252 288,258" fill="none"
              stroke="#f4f491" stroke-width="1.4" opacity="0.45"/>
    <!-- THE NACELLE: the instrument pod under its tent hood -->
    <g>
      <path d="M 362 500 L 366 458 L 382 434 L 400 426 L 420 436 L 432 456 L 438 500 Z"
            fill="#201f2e" stroke="#34324a" stroke-width="2"/>
      <circle cx="400" cy="462" r="13" fill="#101019" stroke="#5e5b80" stroke-width="1.6"/>
      <polyline points="392,464 397,459 402,464 408,459" fill="none" stroke="#f4f491" stroke-width="1.3" opacity="0.85"/>
      <g fill="#5e5b80">
        <circle cx="372" cy="446" r="1.4"/><circle cx="386" cy="433" r="1.4"/>
        <circle cx="414" cy="433" r="1.4"/><circle cx="428" cy="447" r="1.4"/>
      </g>
      <text x="400" y="516" text-anchor="middle" font-family="ui-monospace, monospace"
            font-size="8" letter-spacing="2" fill="#5e5b80">NACELLE</text>
    </g>
    <!-- THE VANE: anemometer at the spinner -->
    <g stroke="#5e5b80" fill="none" stroke-width="1.6" opacity="0.85">
      <line x1="480" y1="596" x2="480" y2="574"/>
      <line x1="480" y1="574" x2="468" y2="566"/><circle cx="465" cy="564" r="4"/>
      <line x1="480" y1="574" x2="492" y2="566"/><circle cx="495" cy="564" r="4"/>
      <line x1="480" y1="574" x2="480" y2="558"/><circle cx="480" cy="555" r="4"/>
    </g>
    <text x="480" y="610" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="7" letter-spacing="2" fill="#5e5b80">VANE</text>
    <!-- BALLAST beside the bank face -->
    <text x="18" y="686" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="8" letter-spacing="2" fill="#5e5b80" transform="rotate(-90 18 686)">BALLAST</text>
    <g stroke="#f4f491" stroke-width="1.4" fill="none" opacity="0.55">
      <polyline points="48,636 54,642 48,648"/>
      <polyline points="48,678 54,684 48,690"/>
      <polyline points="48,720 54,726 48,732"/>
    </g>
    <!-- outlanes: STATIC + THE KEEL -->
    <polyline points="20,820 28,836 20,838 30,856" fill="none" stroke="#f4f491" stroke-width="1.4" opacity="0.5"/>
    <text x="26" y="878" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="7" letter-spacing="1" fill="#5e5b80">STATIC</text>
    <text x="497" y="878" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="7" letter-spacing="1" fill="#5e5b80">KEEL</text>
    <!-- the mooring line (plunger lane) -->
    <line x1="547.5" y1="320" x2="547.5" y2="960" stroke="#34324a" stroke-width="2" stroke-dasharray="10 8" opacity="0.5"/>
    <text x="551" y="640" font-family="ui-monospace, monospace" font-size="8"
          letter-spacing="3" fill="#5e5b80" transform="rotate(90 551 640)">THE MOORING LINE</text>
  </g>

  <!-- ═══════════════ art: walls (storm iron over ink, chrome core) ═══════════════ -->
  <g id="art-rails" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g stroke="#07080d" stroke-width="16"><use href="#collision-paths"/></g>
    <g stroke="#34324a" stroke-width="12"><use href="#collision-paths"/></g>
    <g stroke="#5e5b80" stroke-width="6.5"><use href="#collision-paths"/></g>
    <g stroke="#d7dce8" stroke-width="2.2" opacity="0.7"><use href="#collision-paths"/></g>
  </g>
  <!-- elevated art: the spine run reads as storm glass between chrome wires -->
  <g id="art-rails-elevated" fill="none" stroke-linecap="round">
    <path d="M 112 655 L 109 610 L 107 560 L 106 505 L 106 450 L 106 400 L 104 330 L 107 290 L 119 260 L 138 240 L 160 232"
          stroke="#f4f491" stroke-width="34" opacity="0.13"/>
    <g stroke="#d7dce8" stroke-width="3">
      <path d="M 89 611.1 L 87 560.6 L 86 505.2 L 86 450 L 86 400.3 L 84 329.8 L 87.4 285.8 L 102 249.5 L 126.7 223.5 L 153.2 213.2"/>
      <path d="M 132 653.7 L 129 608.9 L 127 559.4 L 126 504.8 L 126 450 L 126 399.7 L 124 330.2 L 126.6 294.2 L 136 270.5 L 149.3 256.5 L 166.8 250.8"/>
    </g>
  </g>
  <rect x="0" y="0" width="575" height="1050" fill="url(#thVignette)"/>

  <!-- ═══════════════ height profiles ═══════════════ -->
  <g fill="none" stroke="none">
    <path id="height-profile-spine-a" data-layer="1" data-surface="spine" data-surface-width="40" data-height-from="0" data-height-to="22" d="M 112 655 L 109 610 L 107 560 L 106 505 L 106 450"/>
    <path id="height-profile-spine-b" data-layer="1" data-surface="spine" data-surface-width="40" data-height-from="22" data-height-to="34" d="M 106 450 L 106 400 L 104 330 L 107 290"/>
    <path id="height-profile-spine-c" data-layer="1" data-surface="spine" data-surface-width="40" data-height-from="34" data-height-to="34" d="M 107 290 L 119 260 L 138 240 L 160 232"/>
    <path id="height-profile-keel" data-layer="-1" data-height-from="-8" data-height-to="-8" d="M 494 938 L 520 1006 L 547 986"/>
  </g>
  <g id="sensors" fill="none" stroke="none">
    <rect id="sensor-drain" x="0" y="1005" width="520" height="30"/>
    <rect id="sensor-rollover-1" x="140" y="100" width="30" height="20"/>
    <rect id="sensor-rollover-2" x="204" y="100" width="30" height="20"/>
    <rect id="sensor-rollover-3" x="276" y="100" width="30" height="20"/>
    <rect id="sensor-rollover-4" x="340" y="100" width="30" height="20"/>
    <rect id="sensor-ramp-entry" x="2" y="505" width="60" height="16"/>
    <rect id="sensor-ramp-exit" x="440" y="115" width="36" height="36"/>
    <rect id="sensor-spinner" x="450" y="576" width="60" height="12"/>
    <rect id="sensor-kicker-nacelle" x="378" y="442" width="44" height="42"/>
    <rect id="sensor-kicker-static" x="6" y="910" width="38" height="34"/>
    <rect id="sensor-subway-keel" x="478" y="903" width="36" height="34"/>
    <rect id="sensor-skill-stormglass" x="526" y="440" width="43" height="60"/>
  </g>
  <g id="anchors" fill="none" stroke="none">
    <circle id="anchor-flipper-left" cx="178" cy="920" r="5"/>
    <circle id="anchor-flipper-right" cx="342" cy="950" r="5"/>
    <circle id="anchor-spawn" cx="547.5" cy="980" r="5"/>
    <circle id="anchor-magnet-cell1" cx="200" cy="270" r="5"/>
    <circle id="anchor-magnet-cell2" cx="330" cy="255" r="5"/>
    <circle id="anchor-kicker-nacelle" cx="400" cy="462" r="5"/>
    <circle id="anchor-kicker-static" cx="44" cy="775" r="5"/>
  </g>
</svg>
