<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 560 260" width="560" height="260">
  <!-- THUNDERHEAD backglass master (table 9) — the airship holding station
       above the offshore thunderhead, the anthology's moon above the
       weather. Stratus palette + storm yellow (STYLE-GUIDE §2). -->
  <defs>
    <linearGradient id="bgSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#101019"/>
      <stop offset="0.55" stop-color="#16161f"/>
      <stop offset="1" stop-color="#201f2e"/>
    </linearGradient>
    <radialGradient id="bgMoon" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f5f2e8" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#f5f2e8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bgBolt" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#f4f491" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#f4f491" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="560" height="260" fill="url(#bgSky)"/>
  <!-- the moon, above all of it -->
  <circle cx="84" cy="52" r="34" fill="url(#bgMoon)"/>
  <circle cx="84" cy="52" r="15" fill="#f5f2e8" opacity="0.9"/>
  <circle cx="79" cy="47" r="3" fill="#201f2e" opacity="0.35"/>
  <circle cx="90" cy="57" r="2.2" fill="#201f2e" opacity="0.3"/>
  <!-- the thunderhead: boiling cloud mass low across the frame -->
  <g>
    <ellipse cx="140" cy="238" rx="200" ry="52" fill="#201f2e"/>
    <ellipse cx="360" cy="248" rx="230" ry="58" fill="#201f2e"/>
    <ellipse cx="250" cy="222" rx="120" ry="34" fill="#34324a" opacity="0.6"/>
    <ellipse cx="440" cy="226" rx="110" ry="30" fill="#34324a" opacity="0.55"/>
    <ellipse cx="120" cy="214" rx="90" ry="26" fill="#34324a" opacity="0.5"/>
    <ellipse cx="330" cy="204" rx="80" ry="20" fill="#5e5b80" opacity="0.28"/>
  </g>
  <!-- lightning inside the cloud -->
  <circle cx="330" cy="212" r="60" fill="url(#bgBolt)"/>
  <polyline points="322,196 334,214 324,216 340,238" fill="none" stroke="#f4f491" stroke-width="2.4" opacity="0.9"/>
  <polyline points="150,210 160,226 152,227 164,244" fill="none" stroke="#f4f491" stroke-width="1.6" opacity="0.5"/>
  <!-- the airship, holding station above the weather -->
  <g transform="translate(392,96)">
    <ellipse cx="0" cy="0" rx="74" ry="20" fill="#34324a" stroke="#5e5b80" stroke-width="2"/>
    <path d="M -74 0 Q -88 -6 -96 -14 L -88 0 L -96 14 Q -88 6 -74 0 Z" fill="#34324a" stroke="#5e5b80" stroke-width="1.5"/>
    <g stroke="#5e5b80" stroke-width="1.6">
      <line x1="-40" y1="-19" x2="-40" y2="19"/>
      <line x1="0" y1="-20" x2="0" y2="20"/>
      <line x1="40" y1="-19" x2="40" y2="19"/>
    </g>
    <line x1="-24" y1="20" x2="-12" y2="34"/>
    <g stroke="#5e5b80" stroke-width="1.2">
      <line x1="-26" y1="19" x2="-14" y2="33"/>
      <line x1="18" y1="19" x2="8" y2="33"/>
    </g>
    <rect x="-16" y="30" width="30" height="10" rx="3" fill="#201f2e" stroke="#5e5b80" stroke-width="1.5"/>
    <circle cx="-8" cy="35" r="1.6" fill="#f4f491" opacity="0.9"/>
    <circle cx="0" cy="35" r="1.6" fill="#f4f491" opacity="0.9"/>
    <circle cx="8" cy="35" r="1.6" fill="#f4f491" opacity="0.9"/>
  </g>
  <!-- title -->
  <text x="280" y="78" text-anchor="middle" font-family="ui-monospace, monospace"
        font-size="40" letter-spacing="10" fill="#f4f491">THUNDERHEAD</text>
  <text x="280" y="102" text-anchor="middle" font-family="ui-monospace, monospace"
        font-size="11" letter-spacing="5" fill="#5e5b80">HOLDING STATION</text>
</svg>
