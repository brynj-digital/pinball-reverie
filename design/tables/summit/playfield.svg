<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 575 1050" width="575" height="1050">
  <!--
    SUMMIT — table 8 of Pinball Reverie (M15). The last cable car of the
    night up to the weather station: the lineup's first PLAYABLE elevated
    platform. THE TERRACE is a flat h=34 surface (footprint x 320..460,
    y 190..310) with its own z-banded flipper (M15: the bat's contacts
    gate at platform height — anchor-flipper-upper + flippers.upper.z in
    the defs), three z-banded instrument sensors, and TWO exits: the flip
    off the east opening (THE LAUNCH) and the 19-degree SE gutter for
    dribblers. The cable car is the M12 Lift as-is — its airborne release
    10 mm over the platform lands by the M11 ballistic rules, no new
    engine behaviour. Ground traffic passes UNDER the terrace (its rails
    ride at h34, the aerial run's proven straddle height); the launch
    sweep runs beneath the platform's east shoulder.
    Master units: 1 SVG unit = 1 mm. Design truth:
    design/tables/summit/BRIEF.md.
  -->
  <defs>
    <linearGradient id="alpGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1d2733"/>
      <stop offset="0.5" stop-color="#141a22"/>
      <stop offset="1" stop-color="#0d1116"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.42" r="0.85">
      <stop offset="0.6" stop-color="#07080d" stop-opacity="0"/>
      <stop offset="1" stop-color="#07080d" stop-opacity="0.3"/>
    </radialGradient>
    <linearGradient id="auroraSheet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#b8e6ff" stop-opacity="0.25"/>
      <stop offset="1" stop-color="#b8e6ff" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="stationLamp" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffdf9e" stop-opacity="0.2"/>
      <stop offset="1" stop-color="#ffdf9e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- ═══════════════ art: the mountain at night ═══════════════ -->
  <g id="art-field">
    <rect x="0" y="0" width="575" height="1050" fill="url(#alpGrad)"/>
    <!-- the aurora over the ridge line -->
    <path d="M 60 10 Q 160 60 260 24 Q 380 -10 520 40 L 520 90 Q 380 40 270 74 Q 160 110 60 60 Z"
          fill="url(#auroraSheet)"/>
    <path d="M 110 30 Q 240 80 400 40" fill="none" stroke="#b8e6ff" stroke-width="2" opacity="0.35"/>
    <circle cx="120" cy="60" r="9" fill="#f5f2e8" opacity="0.85"/>
    <!-- ridge and scree lines -->
    <g stroke="#31435a" stroke-width="2.5" opacity="0.5" fill="none">
      <path d="M 40 420 L 140 360 L 220 400 L 300 350"/>
      <path d="M 90 640 L 180 580 L 260 620"/>
    </g>
    <!-- the terrace ironwork (elevated art: chrome + ice glass drawn below) -->
    <circle cx="390" cy="250" r="90" fill="url(#stationLamp)"/>
    <text x="390" y="184" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="9" letter-spacing="4" fill="#5c7894">THE TERRACE</text>
    <g fill="#b8e6ff" opacity="0.8">
      <circle cx="347" cy="218" r="2.6"/><circle cx="395" cy="213" r="2.6"/><circle cx="443" cy="228" r="2.6"/>
    </g>
    <text x="347" y="206" text-anchor="middle" font-family="ui-monospace, monospace" font-size="6" fill="#5c7894">BARO</text>
    <text x="395" y="201" text-anchor="middle" font-family="ui-monospace, monospace" font-size="6" fill="#5c7894">TEMP</text>
    <text x="443" y="216" text-anchor="middle" font-family="ui-monospace, monospace" font-size="6" fill="#5c7894">WIND</text>
    <!-- the cable: dock to terrace -->
    <path d="M 240 600 L 270 480 L 330 330 L 390 215" fill="none" stroke="#aeb6c8"
          stroke-width="2" stroke-dasharray="2 8" opacity="0.7"/>
    <!-- the dock -->
    <text x="248" y="664" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="8" letter-spacing="2" fill="#9c7c2c">CABLE CAR</text>
    <!-- THE BOTHY roundel -->
    <g>
      <circle cx="180" cy="466" r="40" fill="#07080d"/>
      <circle cx="180" cy="466" r="34" fill="#141a22"/>
      <circle cx="180" cy="466" r="34" fill="none" stroke="#31435a" stroke-width="3"/>
      <circle cx="180" cy="466" r="38" fill="none" stroke="#9c7c2c" stroke-width="4"/>
      <circle cx="180" cy="466" r="38" fill="none" stroke="#b8e6ff" stroke-width="1.5" stroke-dasharray="5 6"/>
      <path d="M 166 462 L 180 450 L 194 462 L 194 478 L 166 478 Z" fill="none" stroke="#5c7894" stroke-width="2"/>
      <rect x="176" y="468" width="8" height="10" fill="#ffdf9e" opacity="0.7"/>
      <text x="134" y="518" text-anchor="middle" font-family="ui-monospace, monospace"
            font-size="11" letter-spacing="2" fill="#9c7c2c" transform="rotate(-64 134 518)">THE BOTHY</text>
    </g>
    <!-- CORNICE housing -->
    <g>
      <path d="M 65 435 L 82 443 L 82 567 L 65 575" fill="none" stroke="#232f3f" stroke-width="18"/>
      <g fill="#b8e6ff" opacity="0.7">
        <circle cx="78" cy="452" r="1.6"/><circle cx="78" cy="505" r="1.6"/><circle cx="78" cy="558" r="1.6"/>
      </g>
      <text x="72" y="507" text-anchor="middle" font-family="ui-monospace, monospace"
            font-size="10" letter-spacing="3" fill="#9c7c2c" transform="rotate(-90 72 507)">CORNICE</text>
    </g>
    <!-- valley lights at the foot of the field -->
    <g fill="#ffdf9e" opacity="0.5">
      <circle cx="120" cy="880" r="1.4"/><circle cx="170" cy="895" r="1.2"/><circle cx="330" cy="888" r="1.4"/>
      <circle cx="395" cy="874" r="1.2"/><circle cx="452" cy="892" r="1.4"/>
    </g>
    <text x="20" y="905" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="8" letter-spacing="1" fill="#9c7c2c" transform="rotate(-90 20 905)">WINDBREAK</text>
    <text x="500" y="905" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="8" letter-spacing="1" fill="#9c7c2c" transform="rotate(90 500 905)">GALLERY</text>
  </g>

  <!-- ═══════════════ collision (granite rails) ═══════════════ -->
  <defs>
    <g id="collision-paths" fill="none">
      <path data-width="12" data-z="all" id="collision-loop-shell" d="M 0 1050 L 0 260 L 1.3 234.5 L 5 209.3 L 11.2 184.5 L 19.8 160.5 L 30.7 137.4 L 43.8 115.6 L 59 95.1 L 76.2 76.2 L 95.1 59 L 115.6 43.8 L 137.4 30.7 L 160.5 19.8 L 184.5 11.2 L 209.3 5 L 234.5 1.3 L 260 0 L 290.9 1.5 L 321.5 6.1 L 351.4 13.6 L 380.5 24 L 408.5 37.2 L 435 53.1 L 459.8 71.5 L 482.7 92.3 L 503.5 115.2 L 521.9 140 L 537.8 166.5 L 551 194.5 L 561.4 223.6 L 568.9 253.5 L 573.5 284.1 L 575 315 L 575 1050 Z"/>
      <path data-width="12" data-z="all" id="collision-wall-lane" d="M 520 300 L 520 1050"/>
      <!-- the Ridge Run (full orbit); the launch sweep passes UNDER the
           terrace's east shoulder on its way down the right side -->
      <path data-width="12" id="collision-wall-orbit" d="M 65 550 L 65 260 L 66.5 236.2 L 70.8 212.8 L 78 190.1 L 87.8 168.5 L 100.3 148.2 L 115.1 129.5 L 132.1 112.8 L 151 98.3 L 171.5 86.3 L 193.3 76.8 L 216.1 70 L 239.6 66.1 L 263.4 65 L 287.1 66.9 L 310.5 71.6 L 333 79.2 L 354.5 89.4 L 374.6 102.2 L 393 117.4 L 409.4 134.7 L 520 300"/>
      <path data-width="12" id="collision-wall-divider-1" d="M 190 82 L 190 150"/>
      <path data-width="12" id="collision-wall-divider-2" d="M 260 69 L 260 150"/>
      <path data-width="12" id="collision-wall-divider-3" d="M 330 82 L 330 150"/>
      <!-- CORNICE housing (right-flipper cross shot) -->
      <path data-width="12" id="collision-wall-bank-housing" d="M 65 435 L 82 443 L 82 567 L 65 575"/>
      <!-- BOTHY hood: mouth down-RIGHT (right-flipper feed), never traps -->
      <path data-width="12" id="collision-wall-bothy-hood" d="M 136 460 L 137.7 453.7 L 140.2 444.9 L 144 437 L 149.4 431.3 L 156 426.6 L 163 423 L 170.1 420.5 L 177.6 419.1 L 185 419 L 192.7 420.5 L 200.3 423.3 L 207 427 L 212.5 432.3 L 217 438.6 L 220 443"/>
      <!-- cable-car dock: a short channel, mouth opening down-table -->
      <path data-width="12" id="collision-wall-dock-left" d="M 228 588 L 228 646"/>
      <path data-width="12" id="collision-wall-dock-right" d="M 268 588 L 268 646"/>
      <!-- proven outlane kit -->
      <path data-width="12" id="collision-wall-deflector" d="M 0 598 L 34 619 L 0 670"/>
      <path data-width="12" id="collision-wall-guide-left" d="M 52 690 L 52 905 L 174.2 938.4"/>
      <path data-width="12" id="collision-wall-guide-right" d="M 470 690 L 470 905 L 345.9 938.4"/>
      <path data-width="12" id="collision-wall-plunger-saddle" d="M 526 1000 L 569 1000"/>
      <!-- ══ THE TERRACE (M15): platform rails follow the local surface
           height (h34 everywhere) — ground traffic passes beneath ══ -->
      <path data-width="12" data-surface="terrace" id="collision-wall-terrace-north" d="M 320 190 L 460 190"/>
      <path data-width="12" data-surface="terrace" id="collision-wall-terrace-west" d="M 320 190 L 320 258"/>
      <path data-width="12" data-surface="terrace" id="collision-wall-terrace-east" d="M 460 190 L 460 240"/>
      <!-- SE gutter: 19-degree dribble exit past the east opening -->
      <path data-width="12" data-surface="terrace" id="collision-wall-terrace-gutter" d="M 405 302 L 462 318"/>
    </g>
    <!-- diverters: none on this table -->
  </defs>
  <g id="art-rails" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g stroke="#07080d" stroke-width="16"><use href="#collision-paths"/></g>
    <g stroke="#31435a" stroke-width="12"><use href="#collision-paths"/></g>
    <g stroke="#5c7894" stroke-width="6.5"><use href="#collision-paths"/></g>
    <g stroke="#d7dce8" stroke-width="2.2" opacity="0.7"><use href="#collision-paths"/></g>
  </g>
  <!-- elevated art: the terrace bed reads as ice glass between chrome -->
  <g id="art-rails-elevated" fill="none" stroke-linecap="round">
    <path d="M 320 250 L 460 250" stroke="#b8e6ff" stroke-width="112" opacity="0.13"/>
    <path d="M 320 190 L 460 190" stroke="#d7dce8" stroke-width="3"/>
    <path d="M 320 190 L 320 258" stroke="#d7dce8" stroke-width="3"/>
    <path d="M 460 190 L 460 240" stroke="#d7dce8" stroke-width="3"/>
    <path d="M 405 302 L 462 318" stroke="#d7dce8" stroke-width="3"/>
  </g>
  <rect x="0" y="0" width="575" height="1050" fill="url(#vignette)"/>

  <!-- ═══════════════ height profiles ═══════════════ -->
  <g fill="none" stroke="none">
    <!-- the platform: one flat wide surface (the table slope still drains
         it south — flat h means no EXTRA force, not no gravity) -->
    <path id="height-profile-terrace" data-layer="1" data-surface="terrace" data-surface-width="120"
          data-height-from="34" data-height-to="34" d="M 320 250 L 460 250"/>
    <!-- the cable car: lift carry, airborne release 10 mm over the deck -->
    <path id="height-profile-car" data-layer="1" data-height-from="0" data-height-to="44"
          d="M 240 600 L 270 480 L 330 330 L 390 215"/>
    <!-- the gallery: right-outlane subway to the plunger lane -->
    <path id="height-profile-gallery" data-layer="-1" data-height-from="-8" data-height-to="-8"
          d="M 494 935 L 520 1005 L 547 985"/>
  </g>

  <!-- ═══════════════ sensors ═══════════════ -->
  <g fill="none" stroke="none">
    <rect id="sensor-drain" x="0" y="1005" width="520" height="30"/>
    <rect id="sensor-rollover-1" x="147" y="105" width="30" height="20"/>
    <rect id="sensor-rollover-2" x="210" y="105" width="30" height="20"/>
    <rect id="sensor-rollover-3" x="280" y="105" width="30" height="20"/>
    <rect id="sensor-rollover-4" x="343" y="105" width="30" height="20"/>
    <rect id="sensor-spinner" x="0" y="424" width="65" height="12"/>
    <rect id="sensor-ramp-entry" x="2.5" y="495" width="60" height="16"/>
    <rect id="sensor-ramp-exit" x="442" y="117" width="36" height="36"/>
    <rect id="sensor-kicker-bothy" x="158" y="444" width="44" height="44"/>
    <rect id="sensor-kicker-windbreak" x="8" y="940" width="36" height="35"/>
    <rect id="sensor-lift-car" x="230" y="592" width="36" height="22"/>
    <rect id="sensor-subway-gallery" x="478" y="900" width="36" height="35"/>
    <!-- the instruments: platform-only reads (bands ~4 mm loose) -->
    <rect id="sensor-lane-baro" x="330" y="205" width="34" height="26" data-z-min="24"/>
    <rect id="sensor-lane-thermo" x="378" y="200" width="34" height="26" data-z-min="24"/>
    <rect id="sensor-lane-anemo" x="426" y="215" width="34" height="26" data-z-min="24"/>
    <rect id="sensor-skill-lastcar" x="526" y="440" width="43" height="60"/>
  </g>

  <!-- ═══════════════ anchors ═══════════════ -->
  <g fill="none" stroke="none">
    <circle id="anchor-flipper-left" cx="171" cy="950" r="5"/>
    <circle id="anchor-flipper-right" cx="349" cy="950" r="5"/>
    <circle id="anchor-flipper-upper" cx="334" cy="270" r="5"/>
    <circle id="anchor-spawn" cx="547.5" cy="980" r="5"/>
    <circle id="anchor-bumper-1" cx="150" cy="240" r="5"/>
    <circle id="anchor-bumper-2" cx="255" cy="225" r="5"/>
    <circle id="anchor-bumper-3" cx="190" cy="340" r="5"/>
    <circle id="anchor-kicker-bothy" cx="180" cy="470" r="5"/>
    <circle id="anchor-kicker-windbreak" cx="44" cy="680" r="5"/>
  </g>
</svg>
