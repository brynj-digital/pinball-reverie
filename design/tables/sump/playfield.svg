<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 575 1250" width="575" height="1250">
  <!--
    THE SUMP — table 6 of Pinball Reverie (M13). The storm-drain junction
    under the city: the first table whose field CONTINUES BELOW the lineup's
    usual floor — main field y 0..1005, the throat and sump chamber
    y 1005..1250, the true drain at y ~1228. Master units: 1 SVG unit =
    1 mm (style guide §3 as amended 2026-07-17). Design truth:
    design/tables/sump/BRIEF.md; layout clearance-solved against the
    STYLE-GUIDE §4 ball-gap rules.

    This file is the single source of truth for table shape (§5e):
    collision-/sensor-/anchor-/height-profile- prefixed elements are parsed
    into physics by src/table/SvgCollision.ts. The collision strokes ARE
    the drawn walls. The FLOODGATE is a two-blade diverter (shut = the
    diagonal sheds a draining ball right, through the wall opening, to the
    true drain; open = the opening is sealed and the chute runs straight
    into the chamber). The chamber holds the mini flipper pair
    (anchor-flipper-mini-*, M13), the VALVE manifold and the RETURN PIPE
    subway back to the left inlane. The shed walls over the chamber
    shoulders keep outlane traffic out of the ceiling shelves — both voids
    fall clean to the drain.
  -->
  <defs>
    <linearGradient id="culvertGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#17201d"/>
      <stop offset="0.4" stop-color="#101614"/>
      <stop offset="1" stop-color="#0a0d0c"/>
    </linearGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.42" r="0.85">
      <stop offset="0.6" stop-color="#07080d" stop-opacity="0"/>
      <stop offset="1" stop-color="#07080d" stop-opacity="0.36"/>
    </radialGradient>
    <radialGradient id="torchGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffdf9e" stop-opacity="0.22"/>
      <stop offset="1" stop-color="#ffdf9e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="floodGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ff2e44" stop-opacity="0.3"/>
      <stop offset="1" stop-color="#ff2e44" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="workLamp" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffdf9e" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#ffdf9e" stop-opacity="0"/>
    </radialGradient>
    <filter id="glowSoft" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- ═══════════════ art: the junction ═══════════════ -->
  <g id="art-field">
    <rect x="0" y="0" width="575" height="1250" fill="url(#culvertGrad)"/>
    <!-- grate slots at the head of the field: the street above, moonlight in slices -->
    <g fill="#d7dce8" opacity="0.16">
      <rect x="180" y="18" width="8" height="34" rx="3"/>
      <rect x="200" y="14" width="8" height="40" rx="3"/>
      <rect x="220" y="12" width="8" height="43" rx="3"/>
      <rect x="240" y="11" width="8" height="44" rx="3"/>
      <rect x="260" y="11" width="8" height="44" rx="3"/>
      <rect x="280" y="12" width="8" height="43" rx="3"/>
      <rect x="300" y="14" width="8" height="40" rx="3"/>
      <rect x="320" y="18" width="8" height="34" rx="3"/>
    </g>
    <!-- brick arch courses, receding down the junction -->
    <g fill="none" stroke="#2b3a35" stroke-width="3" opacity="0.5">
      <path d="M 80 210 Q 260 130 448 216"/>
      <path d="M 96 400 Q 262 330 436 406"/>
      <path d="M 110 620 Q 262 560 420 624"/>
    </g>
    <g fill="none" stroke="#465e55" stroke-width="1.2" opacity="0.35">
      <path d="M 80 220 Q 260 140 448 226"/>
      <path d="M 96 410 Q 262 340 436 416"/>
      <path d="M 110 630 Q 262 570 420 634"/>
    </g>
    <!-- torch pools on the walls -->
    <circle cx="98" cy="330" r="70" fill="url(#torchGlow)"/>
    <circle cx="440" cy="560" r="70" fill="url(#torchGlow)"/>
    <circle cx="120" cy="820" r="60" fill="url(#torchGlow)"/>
    <!-- the water-level gauge: enamel dial column down the centreline -->
    <g>
      <rect x="238" y="586" width="46" height="176" rx="8" fill="#0a0d0c" stroke="#2b3a35" stroke-width="2.5"/>
      <text x="261" y="580" text-anchor="middle" font-family="ui-monospace, monospace"
            font-size="9" letter-spacing="2" fill="#465e55">WATER LEVEL</text>
      <g fill="none" stroke="#ff2e44" stroke-width="1.4" opacity="0.8">
        <circle cx="261" cy="610" r="9"/><circle cx="261" cy="645" r="9"/>
        <circle cx="261" cy="680" r="9"/><circle cx="261" cy="715" r="9"/>
        <circle cx="261" cy="748" r="9"/>
      </g>
    </g>
    <!-- PUMP HOUSE: iron hatch roundel around the scoop -->
    <g>
      <circle cx="330" cy="466" r="40" fill="#07080d"/>
      <circle cx="330" cy="466" r="34" fill="#101614"/>
      <circle cx="330" cy="466" r="34" fill="none" stroke="#2b3a35" stroke-width="3"/>
      <circle cx="330" cy="466" r="38" fill="none" stroke="#9c7c2c" stroke-width="4"/>
      <circle cx="330" cy="466" r="38" fill="none" stroke="#e0b64e" stroke-width="1.5" stroke-dasharray="5 6"/>
      <g fill="#465e55">
        <circle cx="330" cy="434" r="2.2"/><circle cx="356" cy="450" r="2.2"/>
        <circle cx="356" cy="482" r="2.2"/><circle cx="330" cy="498" r="2.2"/>
        <circle cx="304" cy="482" r="2.2"/><circle cx="304" cy="450" r="2.2"/>
      </g>
      <text x="374" y="522" text-anchor="middle" font-family="ui-monospace, monospace"
            font-size="11" letter-spacing="2" fill="#9c7c2c" transform="rotate(-64 374 522)">PUMP HOUSE</text>
      <!-- approach chevrons from the left flipper -->
      <g stroke="#ff2e44" stroke-width="2.5" fill="none" stroke-linecap="round" stroke-linejoin="round" opacity="0.7">
        <path d="M 262 700.5 L 269 691.5 L 276 700.5" transform="rotate(18 269 696)"/>
        <path d="M 282 640.5 L 289 631.5 L 296 640.5" transform="rotate(18 289 636)"/>
      </g>
    </g>
    <!-- SLUICE housing label -->
    <g>
      <path d="M 65 455 L 82 463 L 82 587 L 65 595" fill="none" stroke="#1c2a24" stroke-width="18"/>
      <g fill="#ff2e44" opacity="0.7">
        <circle cx="78" cy="472" r="1.6"/><circle cx="78" cy="525" r="1.6"/><circle cx="78" cy="578" r="1.6"/>
      </g>
      <text x="72" y="527" text-anchor="middle" font-family="ui-monospace, monospace"
            font-size="10" letter-spacing="3" fill="#9c7c2c" transform="rotate(-90 72 527)">SLUICE</text>
    </g>
    <!-- the throat and floodgate signage -->
    <circle cx="260" cy="1020" r="52" fill="url(#floodGlow)"/>
    <text x="260" y="1024" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="10" letter-spacing="3" fill="#ff2e44" opacity="0.9">FLOODGATE</text>
    <!-- the sump chamber: work-lamp pool + wordmark -->
    <circle cx="260" cy="1150" r="110" fill="url(#workLamp)"/>
    <text x="260" y="1078" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="11" letter-spacing="5" fill="#465e55">THE SUMP</text>
    <text x="330" y="1136" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="8" letter-spacing="2" fill="#9c7c2c">VALVES</text>
    <text x="152" y="1146" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="8" letter-spacing="1" fill="#9c7c2c" transform="rotate(-90 152 1146)">RETURN</text>
    <!-- outlane pipes read as vertical iron shafts -->
    <g fill="none" stroke="#1c2a24" stroke-width="4" opacity="0.6">
      <path d="M 26 950 L 26 1210"/>
      <path d="M 494 950 L 494 1210"/>
    </g>
    <!-- GRATE kickback label -->
    <text x="20" y="905" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="8" letter-spacing="1" fill="#9c7c2c" transform="rotate(-90 20 905)">THE GRATE</text>
  </g>

  <!-- ═══════════════ collision (rendered as layered iron rails) ═══════════════ -->
  <defs>
    <g id="collision-paths" fill="none">
      <!-- outer shell: standard arch, sides extended to the true floor at 1250 -->
      <path data-width="12" data-z="all" id="collision-loop-shell" d="M 0 1250 L 0 260 L 1.3 234.5 L 5 209.3 L 11.2 184.5 L 19.8 160.5 L 30.7 137.4 L 43.8 115.6 L 59 95.1 L 76.2 76.2 L 95.1 59 L 115.6 43.8 L 137.4 30.7 L 160.5 19.8 L 184.5 11.2 L 209.3 5 L 234.5 1.3 L 260 0 L 290.9 1.5 L 321.5 6.1 L 351.4 13.6 L 380.5 24 L 408.5 37.2 L 435 53.1 L 459.8 71.5 L 482.7 92.3 L 503.5 115.2 L 521.9 140 L 537.8 166.5 L 551 194.5 L 561.4 223.6 L 568.9 253.5 L 573.5 284.1 L 575 315 L 575 1250 Z"/>
      <!-- plunger lane inner wall (the access shaft) -->
      <path data-width="12" data-z="all" id="collision-wall-lane" d="M 520 300 L 520 1250"/>
      <!-- orbit inner wall: the Outflow (left lane holds the flow meter) -->
      <path data-width="12" id="collision-wall-orbit" d="M 65 550 L 65 260 L 66.5 236.2 L 70.8 212.8 L 78 190.1 L 87.8 168.5 L 100.3 148.2 L 115.1 129.5 L 132.1 112.8 L 151 98.3 L 171.5 86.3 L 193.3 76.8 L 216.1 70 L 239.6 66.1 L 263.4 65 L 287.1 66.9 L 310.5 71.6 L 333 79.2 L 354.5 89.4 L 374.6 102.2 L 393 117.4 L 409.4 134.7 L 520 300"/>
      <!-- S-U-M-P top-lane dividers -->
      <path data-width="12" id="collision-wall-divider-1" d="M 190 82 L 190 150"/>
      <path data-width="12" id="collision-wall-divider-2" d="M 260 69 L 260 150"/>
      <path data-width="12" id="collision-wall-divider-3" d="M 330 82 L 330 150"/>
      <!-- SLUICE housing: recess brackets off the orbit wall (right-flipper cross shot) -->
      <path data-width="12" id="collision-wall-bank-housing" d="M 65 455 L 82 463 L 82 587 L 65 595"/>
      <!-- PUMP HOUSE hood: mouth opens down-left (left-flipper feed), never traps -->
      <path data-width="12" id="collision-wall-pump-hood" d="M 374 484 L 372.3 477.7 L 369.8 468.9 L 366 461 L 360.6 455.3 L 354 450.6 L 347 447 L 339.9 444.5 L 332.4 443.1 L 325 443 L 317.3 444.5 L 309.7 447.3 L 303 451 L 297.5 456.3 L 293 462.6 L 290 467"/>
      <!-- left-shell deflector (proven outlane kit) -->
      <path data-width="12" id="collision-wall-deflector" d="M 0 598 L 34 619 L 0 670"/>
      <!-- inlane guides, ending tangent to the flipper base circles -->
      <path data-width="12" id="collision-wall-guide-left" d="M 52 690 L 52 905 L 174.2 938.4"/>
      <path data-width="12" id="collision-wall-guide-right" d="M 470 690 L 470 905 L 345.9 938.4"/>
      <!-- plunger saddle -->
      <path data-width="12" id="collision-wall-plunger-saddle" d="M 526 1000 L 569 1000"/>
      <!-- ══ below the old floor: the throat ══ -->
      <!-- The chute is OFFSET: it funnels every centre drain down-left so
           descents drop from the mouth (x 160..232) straight onto the LEFT
           mini flipper's bat — no deflector, no roof. (Three roof-and-shed
           designs before this one each produced a cap-corner cradle at the
           delivery point, all simcheck-found; the offset mouth is the
           shape that has nowhere to pocket.) The drain-branch opening is
           cut into the long right diagonal; the shut blade sheds descents
           through it onto the right ceiling shelf and down to the drain. -->
      <path data-width="12" id="collision-wall-throat-left" d="M 171 962 L 160 1050 L 160 1090"/>
      <path data-width="12" id="collision-wall-throat-right-upper" d="M 349 962 L 305 1013.6"/>
      <!-- the mouth's right jamb: right-hugging descents (the diagonal wall
           and the open blade both lean them right) shed LEFT off it and
           land on the bat, clear of the mini tip gap -->
      <path data-width="12" id="collision-wall-mouth-jamb" d="M 266 1059.4 L 234 1082"/>
      <!-- the landing shelf: one steep continuous line from the jamb root
           to past the chamber wall — gate-shut balls ride blade -> shelf ->
           right void -> true drain in a single slide (the two-piece
           wall+shelf corner cradled a ball in its V, simcheck-found) -->
      <path data-width="12" id="collision-wall-shelf" d="M 266 1059.4 L 396 1131"/>
      <!-- shed walls: keep void traffic off the chamber shoulders -->
      <path data-width="12" id="collision-wall-shed-left" d="M 163 1040 L 124 1058"/>
      <path data-width="12" id="collision-wall-shed-right" d="M 320 1000 L 410 1042"/>
      <!-- the chamber -->
      <path data-width="12" id="collision-wall-ceiling-left" d="M 130 1105 L 160 1090"/>
      <path data-width="12" id="collision-wall-chamber-left" d="M 130 1062 L 130 1240"/>
      <path data-width="12" id="collision-wall-chamber-right" d="M 390 1132 L 390 1240"/>
      <!-- chamber funnels, tangent to the mini flipper base circles -->
      <path data-width="12" id="collision-wall-chamber-funnel-left" d="M 130 1115 L 174.2 1168.4"/>
      <path data-width="12" id="collision-wall-chamber-funnel-right" d="M 390 1136 L 345.8 1168.4"/>
      <!-- VALVE manifold: hung SEALED under the shelf (parallel, ~10 mm —
           an open gap between the two converging faces was a wedge band) -->
      <path data-width="12" id="collision-wall-valve-manifold" d="M 300 1088 L 352 1117"/>
      <!-- descent deflector: a slope hung from the ceiling-right end,
           roofing the mouth — every descent lands on it and sheds LEFT,
           dropping off at (220,1120) onto the LEFT mini flipper's bat.
           Without it the mouth dropped balls dead-centre through the tip
           gap (sump play lasted zero seconds); shedding RIGHT was tried
           twice and failed twice — the ceiling-right cap and the valve
           manifold crowd that corner into V-notch cradles (all
           simcheck-found). The right end shares the ceiling-right start
           cap (sealed); the left end's 20 mm cap gap to ceiling-left
           passes nothing (ball dia 27). -->
      <path data-width="12" id="collision-wall-descent-deflector" d="M 305 1090 L 220 1120"/>
    </g>
    <!-- THE FLOODGATE (M13 diverter): exactly one blade solid at a time.
         shut = the diagonal sheds a draining ball right through the wall
                opening onto the right ceiling shelf and down to the drain;
         open = the opening is sealed flush and the chute runs straight
                into the chamber. A ball resting against "shut" can overlap
                the incoming "open" line — the engine defers that swap. -->
    <g id="diverter-paths" fill="none">
      <path data-width="10" id="collision-diverter-floodgate-shut" d="M 190 1005 L 264 1055"/>
      <path data-width="10" id="collision-diverter-floodgate-open" d="M 303 1017 L 269 1057"/>
    </g>
  </defs>
  <g id="art-rails" fill="none" stroke-linecap="round" stroke-linejoin="round">
    <g stroke="#07080d" stroke-width="16"><use href="#collision-paths"/></g>
    <g stroke="#2b3a35" stroke-width="12"><use href="#collision-paths"/></g>
    <g stroke="#465e55" stroke-width="6.5"><use href="#collision-paths"/></g>
    <g stroke="#d7dce8" stroke-width="2.2" opacity="0.7"><use href="#collision-paths"/></g>
  </g>
  <rect x="0" y="0" width="575" height="1250" fill="url(#vignette)"/>

  <!-- ═══════════════ height profiles (the return pipe) ═══════════════ -->
  <g fill="none" stroke="none">
    <path id="height-profile-return" data-layer="-1" data-height-from="-8" data-height-to="-8"
          d="M 150 1125 L 100 1060 L 78 950 L 72 830 L 74 700"/>
  </g>

  <!-- ═══════════════ sensors (invisible; zones only) ═══════════════ -->
  <g fill="none" stroke="none">
    <rect id="sensor-drain" x="0" y="1228" width="520" height="20"/>
    <rect id="sensor-rollover-1" x="147" y="105" width="30" height="20"/>
    <rect id="sensor-rollover-2" x="210" y="105" width="30" height="20"/>
    <rect id="sensor-rollover-3" x="280" y="105" width="30" height="20"/>
    <rect id="sensor-rollover-4" x="343" y="105" width="30" height="20"/>
    <rect id="sensor-spinner" x="0" y="444" width="65" height="12"/>
    <rect id="sensor-ramp-entry" x="2.5" y="500" width="60" height="16"/>
    <rect id="sensor-ramp-exit" x="442" y="117" width="36" height="36"/>
    <rect id="sensor-kicker-pump" x="308" y="452" width="44" height="44"/>
    <rect id="sensor-kicker-grate" x="8" y="940" width="36" height="35"/>
    <rect id="sensor-subway-return" x="134" y="1112" width="32" height="30"/>
    <rect id="sensor-target-valves" x="290" y="1100" width="72" height="28"/>
    <rect id="sensor-lane-descent" x="164" y="1096" width="64" height="18"/>
    <rect id="sensor-skill-reading" x="526" y="440" width="43" height="60"/>
  </g>

  <!-- ═══════════════ anchors (invisible placement points) ═══════════════ -->
  <g fill="none" stroke="none">
    <circle id="anchor-flipper-left" cx="171" cy="950" r="5"/>
    <circle id="anchor-flipper-right" cx="349" cy="950" r="5"/>
    <circle id="anchor-flipper-mini-left" cx="171" cy="1180" r="5"/>
    <circle id="anchor-flipper-mini-right" cx="349" cy="1180" r="5"/>
    <circle id="anchor-spawn" cx="547.5" cy="980" r="5"/>
    <circle id="anchor-bumper-1" cx="200" cy="240" r="5"/>
    <circle id="anchor-bumper-2" cx="315" cy="225" r="5"/>
    <circle id="anchor-bumper-3" cx="260" cy="340" r="5"/>
    <circle id="anchor-kicker-pump" cx="330" cy="470" r="5"/>
    <circle id="anchor-kicker-grate" cx="44" cy="680" r="5"/>
  </g>
</svg>
