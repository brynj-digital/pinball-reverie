<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 360" width="300" height="360">
  <!-- NIGHT WAVES backglass: shown in the landscape side panel above the
       DMD and as the table-select card (§4.5/§8). Chrome-horizon wordmark,
       the rooftop shack and its transmitter mast over the sleeping city,
       signal rings going out, the same moon. Rooftop field ramp +
       transmitter-amber feature color + white-gold window bulbs per
       STYLE-GUIDE §2 (2026-07-16 amendments). -->
  <defs>
    <linearGradient id="nwSky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#171310"/>
      <stop offset="0.62" stop-color="#262015"/>
      <stop offset="1" stop-color="#3a2f1e"/>
    </linearGradient>
    <linearGradient id="nwChrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="0.46" stop-color="#d7dce8"/>
      <stop offset="0.52" stop-color="#565d6e"/>
      <stop offset="0.60" stop-color="#aeb6c8"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <radialGradient id="nwAmberGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffa028" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffa028" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="nwLampGlow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#fff4d6" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#ffdf9e" stop-opacity="0"/>
    </radialGradient>
    <filter id="nwGlow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="300" height="360" fill="url(#nwSky)"/>

  <!-- the moon and a scatter of stars -->
  <g opacity="0.85">
    <circle cx="244" cy="44" r="15" fill="#aeb6c8" stroke="#07080d" stroke-width="1.5"/>
    <path d="M 244 29 a 15 15 0 0 0 0 30 a 11 15 0 0 1 0 -30 Z" fill="#d7dce8" opacity="0.8"/>
  </g>
  <g fill="#7f8fc9">
    <circle cx="40" cy="34" r="1.1" opacity="0.4"/><circle cx="96" cy="24" r="1" opacity="0.35"/>
    <circle cx="150" cy="44" r="1.2" opacity="0.4"/><circle cx="196" cy="28" r="1" opacity="0.35"/>
    <circle cx="278" cy="86" r="1" opacity="0.3"/><circle cx="66" cy="72" r="1" opacity="0.3"/>
  </g>

  <!-- signal rings radiating from the mast tip, out across the whole sky -->
  <g fill="none" stroke="#ffa028" stroke-linecap="round">
    <path d="M 96 78 A 26 26 0 0 1 122 104" stroke-width="2" opacity="0.6"/>
    <path d="M 88 62 A 44 44 0 0 1 132 106" stroke-width="1.8" opacity="0.4"/>
    <path d="M 80 46 A 62 62 0 0 1 142 108" stroke-width="1.6" opacity="0.25"/>
    <path d="M 72 30 A 80 80 0 0 1 152 110" stroke-width="1.4" opacity="0.15"/>
  </g>

  <!-- the far skyline, sleeping -->
  <g stroke="#07080d" stroke-width="1.5">
    <path d="M 0 196 L 24 196 L 24 178 L 42 178 L 42 190 L 74 190 L 74 170 L 92 170 L 92 192 L 128 192 L 128 182 L 148 182 L 148 196 L 186 196 L 186 172 L 206 172 L 206 188 L 244 188 L 244 178 L 262 178 L 262 194 L 300 194 L 300 236 L 0 236 Z"
          fill="#171310"/>
  </g>
  <!-- scattered windows still lit (bulb points) -->
  <g fill="#ffdf9e">
    <rect x="30" y="184" width="3" height="4" rx="0.6" opacity="0.55"/>
    <rect x="80" y="176" width="3" height="4" rx="0.6" opacity="0.5"/>
    <rect x="134" y="187" width="3" height="4" rx="0.6" opacity="0.45"/>
    <rect x="192" y="178" width="3" height="4" rx="0.6" opacity="0.55"/>
    <rect x="250" y="183" width="3" height="4" rx="0.6" opacity="0.5"/>
  </g>
  <!-- sodium streetlight points along the gaps -->
  <g fill="#ffa028">
    <circle cx="58" cy="228" r="1.6" opacity="0.5"/><circle cx="122" cy="230" r="1.4" opacity="0.45"/>
    <circle cx="226" cy="228" r="1.6" opacity="0.5"/><circle cx="286" cy="231" r="1.3" opacity="0.4"/>
  </g>

  <!-- the near rooftop: parapet, tar-paper, the shack, the mast -->
  <g>
    <path d="M 0 236 L 300 236 L 300 360 L 0 360 Z" fill="#262015" stroke="#07080d" stroke-width="2"/>
    <path d="M 0 236 L 300 236" stroke="#a68d5c" stroke-width="1.4" opacity="0.5"/>
    <!-- tar-paper seams -->
    <g stroke="#171310" stroke-width="2.5" opacity="0.6">
      <line x1="70" y1="242" x2="60" y2="360"/>
      <line x1="170" y1="242" x2="176" y2="360"/>
      <line x1="252" y1="242" x2="262" y2="360"/>
    </g>

    <!-- THE MAST, guyed to the parapet -->
    <g>
      <circle cx="98" cy="82" r="22" fill="url(#nwAmberGlow)"/>
      <g stroke="#07080d" stroke-width="4.5" fill="none">
        <path d="M 86 240 L 98 84 L 110 240"/>
      </g>
      <g stroke="#565d6e" stroke-width="2" fill="none">
        <path d="M 86 240 L 98 84 L 110 240"/>
        <line x1="89.5" y1="196" x2="106.5" y2="196"/>
        <line x1="91.5" y1="168" x2="104.5" y2="168"/>
        <line x1="93" y1="140" x2="103" y2="140"/>
        <line x1="94.5" y1="114" x2="101.5" y2="114"/>
        <path d="M 89.5 196 L 104.5 168 M 106.5 196 L 91.5 168 M 91.5 168 L 103 140 M 104.5 168 L 93 140 M 93 140 L 101.5 114 M 103 140 L 94.5 114"/>
      </g>
      <!-- guy wires -->
      <g stroke="#46381f" stroke-width="1.2" opacity="0.8">
        <line x1="96" y1="130" x2="34" y2="238"/>
        <line x1="100" y1="130" x2="168" y2="238"/>
      </g>
      <circle cx="98" cy="80" r="4" fill="#ffa028" stroke="#07080d" stroke-width="1.5" filter="url(#nwGlow)"/>
    </g>

    <!-- the shack: one warm window, the ON AIR sign over the door -->
    <g transform="translate(196 248)">
      <rect x="-38" y="0" width="76" height="52" rx="3" fill="#171310" stroke="#07080d" stroke-width="2.5"/>
      <path d="M -42 0 L 0 -14 L 42 0 Z" fill="#262015" stroke="#07080d" stroke-width="2.5"/>
      <rect x="-28" y="12" width="20" height="16" rx="2" fill="#ffdf9e" opacity="0.75" stroke="#07080d" stroke-width="2"/>
      <circle cx="-18" cy="20" r="16" fill="url(#nwLampGlow)"/>
      <g stroke="#07080d" stroke-width="1.5">
        <line x1="-18" y1="12" x2="-18" y2="28"/>
        <line x1="-28" y1="20" x2="-8" y2="20"/>
      </g>
      <!-- silhouette at the desk, headphones on -->
      <path d="M -24 28 a 5 5 0 0 1 8 0 l 1 4 h -10 Z" fill="#07080d"/>
      <path d="M -24.5 26 a 5.5 5.5 0 0 1 9 0" fill="none" stroke="#07080d" stroke-width="2"/>
      <rect x="8" y="14" width="22" height="10" rx="2" fill="#171310" stroke="#ffa028" stroke-width="1.4" filter="url(#nwGlow)"/>
      <text x="19" y="21.5" text-anchor="middle" font-family="ui-monospace, monospace"
            font-size="6" letter-spacing="0.5" font-weight="700" fill="#ffa028">ON AIR</text>
      <rect x="10" y="32" width="16" height="20" rx="1.5" fill="#141009" stroke="#07080d" stroke-width="2"/>
    </g>

    <!-- aerials + a pigeon on the parapet -->
    <g stroke="#565d6e" stroke-width="1.6" fill="none" opacity="0.8">
      <path d="M 262 236 L 262 214 M 253 218 L 271 218 M 256 224 L 268 224"/>
      <path d="M 36 236 L 36 220 M 29 223 L 43 223"/>
    </g>
    <path d="M 132 232 a 3.5 3 0 0 1 7 0 l -1 4 h -5 Z" fill="#07080d"/>
    <circle cx="137.5" cy="230.5" r="1.8" fill="#23262f" stroke="#07080d" stroke-width="0.8"/>
  </g>

  <!-- wordmark: chrome horizon, transmitter-amber rim, violet reverie glow -->
  <g>
    <text x="150" y="306" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="30" font-weight="800" letter-spacing="2"
          fill="#4e37a8" opacity="0.55" filter="url(#nwGlow)">NIGHT WAVES</text>
    <text x="150" y="303" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="30" font-weight="800" letter-spacing="2"
          fill="url(#nwChrome)" stroke="#07080d" stroke-width="2" paint-order="stroke">NIGHT WAVES</text>
    <text x="150" y="303" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="30" font-weight="800" letter-spacing="2"
          fill="none" stroke="#ffa028" stroke-width="0.8" opacity="0.9">NIGHT WAVES</text>
    <text x="150" y="328" text-anchor="middle" font-family="ui-monospace, monospace"
          font-size="9" letter-spacing="4" fill="#a68d5c">ON · AIR · TILL · DAWN</text>
  </g>

  <!-- deco frame -->
  <rect x="5" y="5" width="290" height="350" fill="none" stroke="#2c3352" stroke-width="3"/>
  <rect x="9" y="9" width="282" height="342" fill="none" stroke="#9c7c2c" stroke-width="1.5"/>
</svg>
