    <text x="61" y="24" text-anchor="middle" font-family="ui-monospace, monospace" font-size="24" font-weight="800" letter-spacing="3" fill="#fff" transform="rotate(-8 61 16)">TILT</text>
  </g>
  <g transform="translate(128,0)">
    <text x="65" y="24" text-anchor="middle" font-family="ui-monospace, monospace" font-size="24" font-weight="800" letter-spacing="3" fill="#fff" transform="rotate(-2 65 16)">TILT</text>
  </g>
  <g transform="translate(256,0)"><line x1="108" y1="10" x2="124" y2="10" stroke="#888" stroke-width="1.6"/><line x1="108" y1="16" x2="124" y2="16" stroke="#888" stroke-width="1.6"/><line x1="108" y1="22" x2="124" y2="22" stroke="#888" stroke-width="1.6"/>
    <text x="67" y="24" text-anchor="middle" font-family="ui-monospace, monospace" font-size="24" font-weight="800" letter-spacing="3" fill="#fff" transform="rotate(8 67 16)">TILT</text>
  </g>
  <g transform="translate(384,0)">
