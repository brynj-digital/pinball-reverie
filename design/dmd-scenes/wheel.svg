<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 32" width="1024" height="32">
  <!-- MIDNIGHT MIDWAY DMD scene: WHEEL — the ferris wheel rotates one stop
       and the gondola lamps fill; doubles as the bonus-X fanfare and the
       prize reveal backdrop. 8 frames of 128x32 (style guide §6): #fff=3,
       #888=2, #666=1, black=0. Art rows 0..22; caption from row 24. -->
  <rect width="1024" height="32" fill="#000"/>
  <!-- one wheel per frame, spokes advancing 9° per frame, lamps filling -->
  <g id="wf" fill="none">
    <circle cx="64" cy="11" r="9" stroke="#666" stroke-width="1.2"/>
    <path d="M 58 20 L 64 11 L 70 20" stroke="#666" stroke-width="1"/>
    <line x1="52" y1="21" x2="76" y2="21" stroke="#666" stroke-width="1"/>
  </g>
  <use href="#wf" x="0"/><use href="#wf" x="128"/><use href="#wf" x="256"/>
  <use href="#wf" x="384"/><use href="#wf" x="512"/><use href="#wf" x="640"/>
  <use href="#wf" x="768"/><use href="#wf" x="896"/>
  <!-- spokes: rotate a cross by 9° per frame -->
  <g stroke="#888" stroke-width="1">
    <g transform="rotate(0 64 11)"><line x1="55" y1="11" x2="73" y2="11"/><line x1="64" y1="2" x2="64" y2="20"/></g>
    <g transform="rotate(9 192 11)"><line x1="183" y1="11" x2="201" y2="11"/><line x1="192" y1="2" x2="192" y2="20"/></g>
    <g transform="rotate(18 320 11)"><line x1="311" y1="11" x2="329" y2="11"/><line x1="320" y1="2" x2="320" y2="20"/></g>
    <g transform="rotate(27 448 11)"><line x1="439" y1="11" x2="457" y2="11"/><line x1="448" y1="2" x2="448" y2="20"/></g>
    <g transform="rotate(36 576 11)"><line x1="567" y1="11" x2="585" y2="11"/><line x1="576" y1="2" x2="576" y2="20"/></g>
    <g transform="rotate(45 704 11)"><line x1="695" y1="11" x2="713" y2="11"/><line x1="704" y1="2" x2="704" y2="20"/></g>
    <g transform="rotate(54 832 11)"><line x1="823" y1="11" x2="841" y2="11"/><line x1="832" y1="2" x2="832" y2="20"/></g>
    <g transform="rotate(63 960 11)"><line x1="951" y1="11" x2="969" y2="11"/><line x1="960" y1="2" x2="960" y2="20"/></g>
  </g>
  <!-- gondola lamps filling around the rim, then the whole rim lit -->
  <g fill="#888">
    <circle cx="64" cy="2" r="1.5"/>
    <circle cx="192" cy="2" r="1.5"/><circle cx="200.6" cy="6.5" r="1.5"/>
    <circle cx="320" cy="2" r="1.5"/><circle cx="328.6" cy="6.5" r="1.5"/><circle cx="329" cy="14" r="1.5"/>
    <circle cx="448" cy="2" r="1.5"/><circle cx="456.6" cy="6.5" r="1.5"/><circle cx="457" cy="14" r="1.5"/><circle cx="448" cy="20" r="1.5"/>
    <circle cx="576" cy="2" r="1.5"/><circle cx="584.6" cy="6.5" r="1.5"/><circle cx="585" cy="14" r="1.5"/><circle cx="576" cy="20" r="1.5"/><circle cx="567" cy="14" r="1.5"/>
  </g>
  <g fill="#fff">
    <circle cx="704" cy="2" r="1.5"/><circle cx="712.6" cy="6.5" r="1.5"/><circle cx="713" cy="14" r="1.5"/><circle cx="704" cy="20" r="1.5"/><circle cx="695" cy="14" r="1.5"/><circle cx="695.4" cy="6.5" r="1.5"/>
  </g>
  <circle cx="832" cy="11" r="9" fill="none" stroke="#fff" stroke-width="1.5"/>
  <circle cx="960" cy="11" r="9" fill="none" stroke="#888" stroke-width="1.5"/>
</svg>
