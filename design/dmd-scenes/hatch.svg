<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 32" width="1024" height="32">
  <!-- TIDEBREAKER DMD scene: ESCAPE HATCH — ballast blown: the hatch cracks
       and a plume of bubbles jets the ball back up the lane (the kickback
       save). 8 frames of 128x32 (style guide §6): #fff=3, #888=2, #666=1,
       black=0. Art rows 0..22; caption row 24. -->
  <rect width="1024" height="32" fill="#000"/>

  <g transform="translate(0,0)">
    <line x1="52" y1="20" x2="76" y2="20" stroke="#888" stroke-width="1.6"/>
  </g>
  <g transform="translate(128,0)">
    <line x1="52" y1="20" x2="61" y2="20" stroke="#888" stroke-width="1.6"/>
    <line x1="67" y1="20" x2="76" y2="20" stroke="#888" stroke-width="1.6"/>
    <circle cx="64" cy="18" r="1" fill="#666"/>
  </g>
  <g transform="translate(256,0)">
    <line x1="50" y1="20" x2="60" y2="20" stroke="#888" stroke-width="1.6"/>
    <line x1="68" y1="20" x2="78" y2="20" stroke="#888" stroke-width="1.6"/>
    <circle cx="64" cy="16" r="1.4" fill="#888"/>
    <circle cx="60" cy="19" r="1" fill="#666"/><circle cx="69" cy="18" r="1" fill="#666"/>
  </g>
  <g transform="translate(384,0)">
    <line x1="48" y1="20" x2="58" y2="20" stroke="#888" stroke-width="1.6"/>
    <line x1="70" y1="20" x2="80" y2="20" stroke="#888" stroke-width="1.6"/>
    <polygon points="64,9 60,13 68,13" fill="#888"/>
    <circle cx="64" cy="15" r="1.4" fill="#888"/>
    <circle cx="59" cy="17" r="1" fill="#666"/><circle cx="70" cy="18" r="1" fill="#666"/>
  </g>
  <g transform="translate(512,0)">
    <line x1="48" y1="20" x2="58" y2="20" stroke="#888" stroke-width="1.6"/>
    <line x1="70" y1="20" x2="80" y2="20" stroke="#888" stroke-width="1.6"/>
    <polygon points="64,5 59,10 69,10" fill="#fff"/>
    <circle cx="64" cy="12" r="1.6" fill="#fff"/>
    <circle cx="58" cy="15" r="1.2" fill="#888"/><circle cx="71" cy="16" r="1.2" fill="#888"/>
    <circle cx="62" cy="18" r="1" fill="#666"/>
  </g>
  <!-- f5: CLIMAX — full plume, up arrow -->
  <g transform="translate(640,0)">
    <line x1="48" y1="20" x2="58" y2="20" stroke="#666" stroke-width="1.6"/>
    <line x1="70" y1="20" x2="80" y2="20" stroke="#666" stroke-width="1.6"/>
    <polygon points="64,2 58,8 62,8 62,12 66,12 66,8 70,8" fill="#fff"/>
    <circle cx="56" cy="12" r="1.4" fill="#888"/><circle cx="73" cy="13" r="1.4" fill="#888"/>
    <circle cx="60" cy="16" r="1.2" fill="#888"/><circle cx="69" cy="17" r="1.2" fill="#888"/>
    <circle cx="64" cy="18" r="1" fill="#666"/>
  </g>
  <g transform="translate(768,0)">
    <line x1="50" y1="20" x2="60" y2="20" stroke="#666" stroke-width="1.6"/>
    <line x1="68" y1="20" x2="78" y2="20" stroke="#666" stroke-width="1.6"/>
    <circle cx="60" cy="8" r="1.2" fill="#888"/><circle cx="70" cy="10" r="1.2" fill="#888"/>
    <circle cx="64" cy="13" r="1.2" fill="#666"/><circle cx="58" cy="15" r="1" fill="#666"/>
  </g>
  <g transform="translate(896,0)">
    <line x1="52" y1="20" x2="76" y2="20" stroke="#666" stroke-width="1.6"/>
