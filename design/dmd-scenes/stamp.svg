<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 32" width="1024" height="32">
  <!-- MIDNIGHT MIDWAY DMD scene: HAND STAMP — the stamp presses down and
       lifts to leave a glowing star on the back of the hand, and the ball is
       punched back into the park (the kickback save). 8 frames of 128x32
       (style guide §6): #fff=3, #888=2, #666=1, black=0. Art rows 0..22. -->
  <rect width="1024" height="32" fill="#000"/>

  <!-- counter line at y=20 constant; stamp block descends then lifts -->
  <g transform="translate(0,0)">
    <line x1="50" y1="20" x2="78" y2="20" stroke="#888" stroke-width="1.2"/>
    <rect x="60" y="1" width="8" height="2" rx="1" fill="#888"/>
    <line x1="64" y1="3" x2="64" y2="5" stroke="#888" stroke-width="1.4"/>
    <rect x="57" y="5" width="14" height="4" rx="1" fill="#fff"/>
  </g>
  <g transform="translate(128,0)">
    <line x1="50" y1="20" x2="78" y2="20" stroke="#888" stroke-width="1.2"/>
    <rect x="60" y="4" width="8" height="2" rx="1" fill="#888"/>
    <line x1="64" y1="6" x2="64" y2="8" stroke="#888" stroke-width="1.4"/>
    <rect x="57" y="8" width="14" height="4" rx="1" fill="#fff"/>
  </g>
  <g transform="translate(256,0)">
    <line x1="50" y1="20" x2="78" y2="20" stroke="#888" stroke-width="1.2"/>
    <rect x="60" y="7" width="8" height="2" rx="1" fill="#888"/>
    <line x1="64" y1="9" x2="64" y2="11" stroke="#888" stroke-width="1.4"/>
    <rect x="57" y="11" width="14" height="4" rx="1" fill="#fff"/>
  </g>
  <!-- f3: press -->
  <g transform="translate(384,0)">
    <line x1="50" y1="20" x2="78" y2="20" stroke="#fff" stroke-width="1.2"/>
    <rect x="60" y="10" width="8" height="2" rx="1" fill="#888"/>
    <line x1="64" y1="12" x2="64" y2="14" stroke="#888" stroke-width="1.4"/>
    <rect x="56" y="14" width="16" height="4" rx="1" fill="#fff"/>
    <line x1="52" y1="16" x2="49" y2="14" stroke="#888" stroke-width="1"/>
    <line x1="76" y1="16" x2="79" y2="14" stroke="#888" stroke-width="1"/>
  </g>
  <!-- f4: still pressed, ink taking -->
  <g transform="translate(512,0)">
    <line x1="50" y1="20" x2="78" y2="20" stroke="#888" stroke-width="1.2"/>
    <rect x="60" y="9" width="8" height="2" rx="1" fill="#888"/>
    <line x1="64" y1="11" x2="64" y2="13" stroke="#888" stroke-width="1.4"/>
    <rect x="56" y="13" width="16" height="4" rx="1" fill="#888"/>
  </g>
  <!-- f5: CLIMAX — stamp lifts, star revealed -->
  <g transform="translate(640,0)">
    <line x1="50" y1="20" x2="78" y2="20" stroke="#888" stroke-width="1.2"/>
    <rect x="60" y="4" width="8" height="2" rx="1" fill="#888"/>
    <line x1="64" y1="6" x2="64" y2="8" stroke="#888" stroke-width="1.4"/>
    <rect x="57" y="8" width="14" height="4" rx="1" fill="#888"/>
    <polygon points="64,14 65.6,17.5 69,18 65.6,18.5 64,22 62.4,18.5 59,18 62.4,17.5" fill="#fff"/>
    <circle cx="55" cy="16" r="0.9" fill="#888"/><circle cx="73" cy="16" r="0.9" fill="#888"/>
  </g>
  <g transform="translate(768,0)">
    <line x1="50" y1="20" x2="78" y2="20" stroke="#888" stroke-width="1.2"/>
    <rect x="60" y="2" width="8" height="2" rx="1" fill="#666"/>
    <rect x="57" y="6" width="14" height="4" rx="1" fill="#666"/>
    <polygon points="64,15 65.4,18 68,18.4 65.4,18.8 64,21.5 62.6,18.8 60,18.4 62.6,18" fill="#888"/>
  </g>
  <g transform="translate(896,0)">
    <line x1="50" y1="20" x2="78" y2="20" stroke="#666" stroke-width="1.2"/>
    <polygon points="64,16 65.2,18.5 67.5,18.8 65.2,19.1 64,21.5 62.8,19.1 60.5,18.8 62.8,18.5" fill="#888"/>
  </g>
</svg>
