<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 32" width="1024" height="32">
  <!-- MIDNIGHT MIDWAY DMD scene: DROP TOWER — the gondola is winched to the
       top, plummets the mast, and bursts as it hits the base (the bank-drop
       fanfare, twin of Moondial's BANK comet impact). 8 frames of 128x32
       (style guide §6): #fff=3, #888=2, #666=1, black=0. Art rows 0..22;
       caption from row 24. -->
  <rect width="1024" height="32" fill="#000"/>

  <!-- mast + top hub constant; car drops accelerating y: 3,4,6,9,13,17,18,18 -->
  <g transform="translate(0,0)">
    <line x1="56" y1="2" x2="72" y2="2" stroke="#888" stroke-width="1.2"/>
    <line x1="64" y1="2" x2="64" y2="21" stroke="#888" stroke-width="1.2"/>
    <line x1="52" y1="21" x2="76" y2="21" stroke="#666" stroke-width="1"/>
    <rect x="58" y="3" width="12" height="3" rx="1" fill="#fff"/>
    <circle cx="61" cy="4.5" r="0.6" fill="#666"/><circle cx="67" cy="4.5" r="0.6" fill="#666"/>
  </g>
  <g transform="translate(128,0)">
    <line x1="56" y1="2" x2="72" y2="2" stroke="#888" stroke-width="1.2"/>
    <line x1="64" y1="2" x2="64" y2="21" stroke="#888" stroke-width="1.2"/>
    <line x1="52" y1="21" x2="76" y2="21" stroke="#666" stroke-width="1"/>
    <rect x="58" y="4" width="12" height="3" rx="1" fill="#fff"/>
    <circle cx="61" cy="5.5" r="0.6" fill="#666"/><circle cx="67" cy="5.5" r="0.6" fill="#666"/>
  </g>
  <g transform="translate(256,0)">
    <line x1="56" y1="2" x2="72" y2="2" stroke="#888" stroke-width="1.2"/>
    <line x1="64" y1="2" x2="64" y2="21" stroke="#888" stroke-width="1.2"/>
    <line x1="52" y1="21" x2="76" y2="21" stroke="#666" stroke-width="1"/>
    <rect x="58" y="6" width="12" height="3" rx="1" fill="#fff"/>
    <circle cx="61" cy="7.5" r="0.6" fill="#666"/><circle cx="67" cy="7.5" r="0.6" fill="#666"/>
  </g>
  <g transform="translate(384,0)">
    <line x1="56" y1="2" x2="72" y2="2" stroke="#888" stroke-width="1.2"/>
    <line x1="64" y1="2" x2="64" y2="21" stroke="#888" stroke-width="1.2"/>
    <line x1="52" y1="21" x2="76" y2="21" stroke="#666" stroke-width="1"/>
    <line x1="58" y1="2" x2="58" y2="7" stroke="#666" stroke-width="0.8"/>
    <line x1="70" y1="2" x2="70" y2="7" stroke="#666" stroke-width="0.8"/>
    <rect x="58" y="9" width="12" height="3" rx="1" fill="#fff"/>
    <circle cx="61" cy="10.5" r="0.6" fill="#666"/><circle cx="67" cy="10.5" r="0.6" fill="#666"/>
  </g>
  <g transform="translate(512,0)">
    <line x1="56" y1="2" x2="72" y2="2" stroke="#888" stroke-width="1.2"/>
    <line x1="64" y1="2" x2="64" y2="21" stroke="#888" stroke-width="1.2"/>
    <line x1="52" y1="21" x2="76" y2="21" stroke="#666" stroke-width="1"/>
    <line x1="58" y1="4" x2="58" y2="11" stroke="#666" stroke-width="0.8"/>
    <line x1="70" y1="4" x2="70" y2="11" stroke="#666" stroke-width="0.8"/>
    <rect x="58" y="13" width="12" height="3" rx="1" fill="#fff"/>
    <circle cx="61" cy="14.5" r="0.6" fill="#666"/><circle cx="67" cy="14.5" r="0.6" fill="#666"/>
  </g>
  <g transform="translate(640,0)">
    <line x1="56" y1="2" x2="72" y2="2" stroke="#888" stroke-width="1.2"/>
    <line x1="64" y1="2" x2="64" y2="21" stroke="#888" stroke-width="1.2"/>
    <line x1="52" y1="21" x2="76" y2="21" stroke="#666" stroke-width="1"/>
    <line x1="58" y1="9" x2="58" y2="15" stroke="#666" stroke-width="0.8"/>
    <line x1="70" y1="9" x2="70" y2="15" stroke="#666" stroke-width="0.8"/>
    <rect x="58" y="17" width="12" height="3" rx="1" fill="#fff"/>
    <circle cx="61" cy="18.5" r="0.6" fill="#666"/><circle cx="67" cy="18.5" r="0.6" fill="#666"/>
  </g>
  <!-- f6: impact -->
  <g transform="translate(768,0)">
    <line x1="56" y1="2" x2="72" y2="2" stroke="#888" stroke-width="1.2"/>
    <line x1="64" y1="2" x2="64" y2="19" stroke="#888" stroke-width="1.2"/>
    <line x1="52" y1="21" x2="76" y2="21" stroke="#888" stroke-width="1"/>
    <rect x="58" y="17" width="12" height="3" rx="1" fill="#fff"/>
    <circle cx="64" cy="18.5" r="4.5" fill="none" stroke="#fff" stroke-width="1.4"/>
    <line x1="70" y1="14" x2="73" y2="11" stroke="#fff" stroke-width="1"/>
    <line x1="58" y1="14" x2="55" y2="11" stroke="#fff" stroke-width="1"/>
    <line x1="52" y1="18.5" x2="48" y2="18.5" stroke="#fff" stroke-width="1"/>
    <line x1="76" y1="18.5" x2="80" y2="18.5" stroke="#fff" stroke-width="1"/>
  </g>
  <!-- f7: burst fades -->
  <g transform="translate(896,0)">
    <line x1="56" y1="2" x2="72" y2="2" stroke="#666" stroke-width="1.2"/>
    <line x1="64" y1="2" x2="64" y2="19" stroke="#666" stroke-width="1.2"/>
    <line x1="52" y1="21" x2="76" y2="21" stroke="#888" stroke-width="1"/>
    <rect x="58" y="17" width="12" height="3" rx="1" fill="#888"/>
    <circle cx="64" cy="18.5" r="8" fill="none" stroke="#888" stroke-width="1.2"/>
    <line x1="73" y1="11" x2="77" y2="7" stroke="#888" stroke-width="1"/>
    <line x1="55" y1="11" x2="51" y2="7" stroke="#888" stroke-width="1"/>
    <line x1="49" y1="18.5" x2="44" y2="18.5" stroke="#888" stroke-width="1"/>
    <line x1="79" y1="18.5" x2="84" y2="18.5" stroke="#888" stroke-width="1"/>
  </g>
</svg>
