<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 32" width="1024" height="32">
  <!-- THUNDERHEAD DMD scene: THE EYE — the clouds open on dead calm — 8 frames of 128x32, baked to 4-level dot frames at load.
       Levels by luminance: #fff=3, #888=2, #666=1. -->
