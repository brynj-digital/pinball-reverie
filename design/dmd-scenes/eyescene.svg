  <g transform="translate(128,0)"><rect x="0" y="0" width="51" height="32" fill="#666"/><rect x="77" y="0" width="51" height="32" fill="#666"/></g>
  <g transform="translate(256,0)"><rect x="0" y="0" width="44" height="32" fill="#666"/><rect x="84" y="0" width="44" height="32" fill="#666"/><line x1="44" y1="26" x2="84" y2="26" stroke="#888" stroke-width="1"/></g>
  <g transform="translate(384,0)"><rect x="0" y="0" width="37" height="32" fill="#666"/><rect x="91" y="0" width="37" height="32" fill="#666"/><circle cx="64" cy="12" r="4.3" fill="#fff"/><line x1="37" y1="26" x2="91" y2="26" stroke="#888" stroke-width="1"/></g>
  <g transform="translate(512,0)"><rect x="0" y="0" width="29" height="32" fill="#666"/><rect x="99" y="0" width="29" height="32" fill="#666"/><circle cx="64" cy="12" r="4.7" fill="#fff"/><line x1="29" y1="26" x2="99" y2="26" stroke="#888" stroke-width="1"/></g>
  <g transform="translate(640,0)"><rect x="0" y="0" width="22" height="32" fill="#666"/><rect x="106" y="0" width="22" height="32" fill="#666"/><circle cx="64" cy="12" r="5.1" fill="#fff"/><line x1="22" y1="26" x2="106" y2="26" stroke="#888" stroke-width="1"/></g>
  <g transform="translate(768,0)"><rect x="0" y="0" width="15" height="32" fill="#666"/><rect x="113" y="0" width="15" height="32" fill="#666"/><circle cx="64" cy="12" r="5.6" fill="#fff"/><line x1="15" y1="26" x2="113" y2="26" stroke="#888" stroke-width="1"/></g>
  <g transform="translate(896,0)"><rect x="0" y="0" width="8" height="32" fill="#666"/><rect x="120" y="0" width="8" height="32" fill="#666"/><circle cx="64" cy="12" r="6.0" fill="#fff"/><line x1="8" y1="26" x2="120" y2="26" stroke="#888" stroke-width="1"/></g>
