<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 32" width="1024" height="32">
  <!-- MIDNIGHT MIDWAY DMD scene: HIGH STRIKER — the mallet swings, the puck
       climbs the tower, the bell rings. 8 frames of 128x32 (style guide
       §6): #fff=3, #888=2, #666=1, black=0. Art rows 0..22; caption from
       row 24. Tower at the right, mallet at the left. -->
  <rect width="1024" height="32" fill="#000"/>
  <!-- constant: tower + bell + strike pad + barker figure ground line -->
  <g id="rig">
    <line x1="96" y1="3" x2="96" y2="21" stroke="#666" stroke-width="1.2"/>
    <g stroke="#666" stroke-width="1">
      <line x1="93" y1="18" x2="99" y2="18"/><line x1="93" y1="14" x2="99" y2="14"/>
      <line x1="93" y1="10" x2="99" y2="10"/><line x1="93" y1="6" x2="99" y2="6"/>
    </g>
    <path d="M 92 3 A 4 3 0 0 1 100 3" fill="#888" stroke="none"/>
    <rect x="88" y="20" width="16" height="2" fill="#666"/>
  </g>
  <use href="#rig" x="0"/><use href="#rig" x="128"/><use href="#rig" x="256"/>
  <use href="#rig" x="384"/><use href="#rig" x="512"/><use href="#rig" x="640"/>
  <use href="#rig" x="768"/><use href="#rig" x="896"/>
  <!-- f0-f2: the mallet swings down onto the pad -->
  <g stroke="#888" stroke-width="1.5" fill="#888">
    <line x1="52" y1="18" x2="62" y2="6"/><rect x="59" y="2" width="8" height="5"/>
  </g>
  <g stroke="#888" stroke-width="1.5" fill="#888">
    <line x1="180" y1="18" x2="194" y2="12"/><rect x="192" y="8" width="8" height="5"/>
  </g>
  <g>
    <line x1="308" y1="18" x2="322" y2="19" stroke="#fff" stroke-width="1.5"/>
    <rect x="320" y="16" width="8" height="5" fill="#fff"/>
    <g stroke="#888" stroke-width="1"><line x1="330" y1="15" x2="334" y2="12"/><line x1="331" y1="19" x2="336" y2="19"/></g>
  </g>
  <!-- f3-f5: the puck climbs -->
  <g><rect x="478" y="16" width="4" height="3" fill="#fff"/><line x1="436" y1="19" x2="450" y2="20" stroke="#666" stroke-width="1.5"/></g>
  <g><rect x="606" y="11" width="4" height="3" fill="#fff"/><line x1="564" y1="19" x2="578" y2="20" stroke="#666" stroke-width="1.5"/></g>
  <g><rect x="734" y="5" width="4" height="3" fill="#fff"/><line x1="692" y1="19" x2="706" y2="20" stroke="#666" stroke-width="1.5"/></g>
  <!-- f6: DING — the bell bursts -->
  <g>
    <path d="M 860 3 A 4 3 0 0 1 868 3" fill="#fff" stroke="none"/>
    <g stroke="#fff" stroke-width="1">
      <line x1="856" y1="1" x2="852" y2="0"/><line x1="872" y1="1" x2="876" y2="0"/>
      <line x1="855" y1="5" x2="851" y2="6"/><line x1="873" y1="5" x2="877" y2="6"/>
    </g>
    <rect x="862" y="6" width="4" height="3" fill="#888"/>
  </g>
  <!-- f7: afterglow -->
  <g>
    <path d="M 988 3 A 4 3 0 0 1 996 3" fill="#888" stroke="none"/>
    <g stroke="#666" stroke-width="1"><line x1="984" y1="1" x2="981" y2="0"/><line x1="1000" y1="1" x2="1003" y2="0"/></g>
  </g>
</svg>
