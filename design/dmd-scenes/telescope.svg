    </g>
    <circle cx="64" cy="11" r="1.4" fill="#888"/>
  </g>
  <g transform="translate(512,0)">
    <circle cx="20" cy="5" r="0.9" fill="#666"/><circle cx="105" cy="8" r="0.9" fill="#666"/>
    <circle cx="40" cy="26" r="0.9" fill="#666"/><circle cx="90" cy="24" r="0.9" fill="#666"/>
    <circle cx="64" cy="11" r="11" fill="none" stroke="#888" stroke-width="1.4"/>
    <polygon points="64,7 64.9,10.1 68,11 64.9,11.9 64,15 63.1,11.9 60,11 63.1,10.1" fill="#fff"/>
