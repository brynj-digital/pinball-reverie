    <circle cx="40" cy="26" r="0.9" fill="#666"/><circle cx="90" cy="24" r="0.9" fill="#666"/>
    <circle cx="64" cy="11" r="11" fill="none" stroke="#666" stroke-width="1.4"/>
    <polygon points="64,4 65.5,9.5 71,11 65.5,12.5 64,18 62.5,12.5 57,11 62.5,9.5" fill="#888"/>
    <circle cx="52" cy="3" r="1" fill="#666"/><circle cx="77" cy="18" r="1" fill="#666"/>
