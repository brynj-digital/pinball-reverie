    <circle cx="56" cy="4" r="1" fill="#888"/><circle cx="73" cy="17" r="1" fill="#888"/>
  </g>
  <g transform="translate(768,0)">
    <circle cx="20" cy="5" r="0.9" fill="#666"/><circle cx="105" cy="8" r="0.9" fill="#666"/>
    <circle cx="40" cy="26" r="0.9" fill="#666"/><circle cx="90" cy="24" r="0.9" fill="#666"/>
    <circle cx="64" cy="11" r="13" fill="none" stroke="#888" stroke-width="1.4"/>
    <polygon points="64,1 66.2,8.8 74,11 66.2,13.2 64,21 61.8,13.2 54,11 61.8,8.8" fill="#fff"/>
