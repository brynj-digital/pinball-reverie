<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 32" width="1024" height="32">
  <!-- TIDEBREAKER DMD scene: WINCH — the cable pays in and a salvage crate
       rises from the depths to the davit, flaring as it breaks into the
       lamplight. 8 frames of 128x32 (style guide §6): #fff=3, #888=2,
       #666=1, black=0. Art rows 0..22; caption renders from row 24. -->
  <rect width="1024" height="32" fill="#000"/>
  <!-- davit arm is constant: pulley at top-centre, deck line at left -->
  <g transform="translate(0,0)">
    <line x1="40" y1="2" x2="88" y2="2" stroke="#888" stroke-width="1.4"/>
    <circle cx="64" cy="3" r="2" fill="#888"/>
    <line x1="64" y1="4" x2="64" y2="22" stroke="#666" stroke-width="1.2"/>
    <rect x="57" y="20" width="14" height="2" fill="#666"/>
  </g>
  <g transform="translate(128,0)">
