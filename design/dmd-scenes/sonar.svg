<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 768 32" width="768" height="32">
  <!-- TIDEBREAKER DMD scene: SONAR — a ping leaves the transducer, the ring
       expands across the scope and a contact blip flares on the second
       sweep. 6 frames of 128x32, baked to 4-level dot frames at load (style
       guide §6). Bake levels by luminance: #fff=3, #888=2, #666=1, black=0.
       Art stays in rows 0..22; the caption row renders from row 24. -->
  <rect width="768" height="32" fill="#000"/>
  <g transform="translate(0,0)">
    <circle cx="64" cy="11" r="2" fill="#fff"/>
    <circle cx="64" cy="11" r="5" fill="none" stroke="#888" stroke-width="1.4"/>
    <circle cx="20" cy="6" r="0.9" fill="#666"/><circle cx="104" cy="18" r="0.9" fill="#666"/>
  </g>
  <g transform="translate(128,0)">
    <circle cx="64" cy="11" r="1.4" fill="#888"/>
    <circle cx="64" cy="11" r="6" fill="none" stroke="#fff" stroke-width="1.4"/>
    <circle cx="64" cy="11" r="10" fill="none" stroke="#666" stroke-width="1.2"/>
    <circle cx="20" cy="6" r="0.9" fill="#666"/><circle cx="104" cy="18" r="0.9" fill="#666"/>
  </g>
  <g transform="translate(256,0)">
    <circle cx="64" cy="11" r="1.4" fill="#666"/>
    <circle cx="64" cy="11" r="9" fill="none" stroke="#888" stroke-width="1.4"/>
    <circle cx="64" cy="11" r="14" fill="none" stroke="#fff" stroke-width="1.4"/>
    <circle cx="20" cy="6" r="0.9" fill="#666"/><circle cx="104" cy="18" r="0.9" fill="#888"/>
  </g>
  <g transform="translate(384,0)">
    <circle cx="64" cy="11" r="1.4" fill="#666"/>
    <circle cx="64" cy="11" r="13" fill="none" stroke="#666" stroke-width="1.2"/>
    <circle cx="64" cy="11" r="19" fill="none" stroke="#888" stroke-width="1.4"/>
    <line x1="64" y1="11" x2="94" y2="3" stroke="#888" stroke-width="1.2"/>
    <circle cx="20" cy="6" r="0.9" fill="#666"/><circle cx="104" cy="18" r="1.2" fill="#fff"/>
  </g>
  <g transform="translate(512,0)">
    <circle cx="64" cy="11" r="1.4" fill="#666"/>
    <circle cx="64" cy="11" r="18" fill="none" stroke="#666" stroke-width="1.2"/>
    <line x1="64" y1="11" x2="98" y2="13" stroke="#888" stroke-width="1.2"/>
    <circle cx="104" cy="18" r="2.2" fill="#fff"/>
    <circle cx="104" cy="18" r="4.5" fill="none" stroke="#888" stroke-width="1.2"/>
    <circle cx="20" cy="6" r="0.9" fill="#666"/>
  </g>
  <g transform="translate(640,0)">
    <circle cx="64" cy="11" r="1.4" fill="#666"/>
    <line x1="64" y1="11" x2="92" y2="20" stroke="#666" stroke-width="1.2"/>
    <circle cx="104" cy="18" r="1.6" fill="#888"/>
    <circle cx="104" cy="18" r="6" fill="none" stroke="#666" stroke-width="1.2"/>
    <circle cx="20" cy="6" r="0.9" fill="#666"/>
  </g>
</svg>
