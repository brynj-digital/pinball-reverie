<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 32" width="1024" height="32">
  <!-- MIDNIGHT MIDWAY DMD scene: SKY RIDE — a lit gondola glides the cable
       across the night park, swaying as it goes. The combo twin of Moondial's
       ORBIT sweep. 8 frames of 128x32 (style guide §6): #fff=3, #888=2,
       #666=1, black=0. Art rows 0..22; caption from row 24. -->
  <rect width="1024" height="32" fill="#000"/>

  <!-- gondola x per frame: 12,28,44,60,76,92,108,120; cable slopes 5->9;
       sway offsets the car; two stars sit under the caption clear-zone -->
