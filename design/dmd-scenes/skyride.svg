    <line x1="0" y1="5" x2="128" y2="9" stroke="#888" stroke-width="1.2"/>
    <circle cx="26" cy="20" r="0.9" fill="#666"/><circle cx="98" cy="21" r="0.9" fill="#666"/>
    <line x1="12" y1="5.4" x2="11" y2="11" stroke="#888" stroke-width="1"/>
    <rect x="7" y="11" width="8" height="5" rx="1" fill="#fff"/>
